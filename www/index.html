<!doctype html>
<html lang="id" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nonoted</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22white%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><circle cx=%2212%22 cy=%2212%22 r=%2212%22 fill=%22%232563eb%22 stroke=%22none%22/><g transform=%22translate(4,4) scale(0.66)%22><path d=%22M13.4 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7.4%22/><path d=%22M2 6h4%22/><path d=%22M16 2v4%22/><path d=%22m21.2 8.8-9 9a2 1.5 2 1.5 0 0 0 0 3l-1 1-1-1a2.1.5 2.1.5 0 0 0 0-3l9-9a2 2 0 0 1 2.8 2.8Z%22/></g></svg>" />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide (Outline icons) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Flowbite -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/datepicker.min.js"></script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.3);
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.5);
        }

        .fade-in {
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hide scrollbar for sidebar on mobile if needed */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* GPU compositing for smooth modal animations */
        #addModal,
        #editModal,
        #viewModal,
        #authModal,
        #logoutModal {
            will-change: opacity;
        }

        #addModalContent,
        #modalContent,
        #viewModalContent,
        #authModalContent,
        #logoutModalContent {
            will-change: transform, opacity;
        }

        /* Limit reflow scope to the notes grid */
        #notesGrid {
            contain: layout style;
        }
    </style>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                    },
                },
            },
        };
    </script>
</head>

<body
    class="bg-white text-slate-800 dark:bg-slate-950 dark:text-slate-200 transition-colors duration-300 antialiased selection:bg-blue-500/30 selection:text-blue-600 dark:selection:text-blue-300">
    <div class="flex h-screen w-full overflow-hidden">
        <!-- Sidebar Backdrop -->
        <div id="sidebarBackdrop"
            class="fixed inset-0 bg-slate-950/20 dark:bg-black/60 backdrop-blur-sm z-[45] hidden md:hidden transition-opacity">
        </div>
        <!-- Sidebar -->
        <aside id="sidebar"
            class="w-64 flex-col border-r border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50 hidden md:flex fixed md:relative inset-y-0 left-0 z-50 h-full shadow-2xl md:shadow-none">
            <div class="h-16 flex items-center px-6 border-b border-slate-200 dark:border-slate-800">
                <div class="flex items-center gap-2 font-bold text-lg tracking-tight">
                    <div class="h-8 w-8 rounded-lg bg-blue-600 flex items-center justify-center text-white">
                        <i data-lucide="notebook-pen" class="h-4 w-4"></i>
                    </div>
                    <span>Nonoted</span>
                </div>
                <!-- Close Sidebar (Mobile) -->
                <button id="btnCloseSidebar"
                    class="md:hidden ml-auto p-2 text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">
                    <i data-lucide="x" class="h-5 w-5"></i>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-6 bg-white dark:bg-slate-950/50 md:bg-transparent">
                <!-- Main Nav -->
                <nav class="space-y-1">
                    <button onclick="filterNotes('all')" id="nav-all"
                        class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300 transition-colors">
                        <i data-lucide="layers" class="h-4 w-4"></i>
                        Semua Catatan
                    </button>
                    <button onclick="filterNotes('pinned')" id="nav-pinned"
                        class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="pin" class="h-4 w-4"></i>
                        Pinned
                    </button>
                    <button onclick="filterNotes('drafts')" id="nav-drafts"
                        class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="clipboard-pen" class="h-4 w-4"></i>
                        Drafts
                    </button>
                    <button onclick="filterNotes('tasks')" id="nav-tasks"
                        class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors mt-4">
                        <i data-lucide="calendar-check" class="h-4 w-4"></i>
                        Tasks
                    </button>
                </nav>

                <!-- Tags -->
                <div>
                    <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 px-3">
                        Tags
                    </div>
                    <nav id="tagsList" class="space-y-1">
                        <!-- Dynamic tags will go here -->
                    </nav>
                </div>
            </div>

            <div
                class="p-4 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950/50 md:bg-transparent space-y-1">
                <button id="btnSidebarProfile" onclick="openAuthModal()"
                    class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <i data-lucide="user" class="h-4 w-4"></i>
                    <span id="sidebarProfileText">Profile</span>
                </button>
                <button id="btnSidebarLogout"
                    class="hidden w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-900/20 transition-colors">
                    <i data-lucide="log-out" class="h-4 w-4"></i>
                    Log Out
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full relative">
            <!-- Header -->
            <header
                class="h-16 flex items-center justify-between px-4 sm:px-8 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-sm z-10">
                <div class="flex items-center gap-4 flex-1">
                    <button id="btnMenu"
                        class="md:hidden p-2 -ml-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg">
                        <i data-lucide="menu" class="h-5 w-5"></i>
                    </button>
                    <div class="relative w-full max-w-md">
                        <i data-lucide="search"
                            class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400 z-10"></i>
                        <input id="searchInput" type="text" placeholder="Cari catatan..."
                            class="w-full pl-9 pr-4 py-2 bg-slate-100 dark:bg-slate-900 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500/50 outline-none transition-all placeholder:text-slate-500 text-slate-700 dark:text-slate-200"
                            autocomplete="off" />
                        <!-- Search Results Dropdown -->
                        <div id="searchDropdown"
                            class="hidden absolute top-full left-0 right-0 mt-2 bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800 z-[200] max-h-[420px] overflow-y-auto">
                            <div id="searchDropdownList" class="py-2"></div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-3 ml-4">
                    <div
                        class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-900 text-xs font-medium text-slate-500">
                        <span id="countNotes">0</span> Catatan
                    </div>
                    <button id="themeToggle"
                        class="p-2 rounded-xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                        title="Toggle Theme">
                        <i data-lucide="moon" class="h-5 w-5 hidden dark:block"></i>
                        <i data-lucide="sun" class="h-5 w-5 block dark:hidden"></i>
                    </button>
                    <button id="btnExport"
                        class="p-2 rounded-xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                        title="Export">
                        <i data-lucide="download" class="h-5 w-5"></i>
                    </button>
                    <div class="relative">
                        <button id="btnProfile"
                            class="flex items-center gap-2 px-3 py-2 rounded-xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                            title="Profile">
                            <i data-lucide="user-circle" class="h-5 w-5"></i>
                            <span class="hidden sm:inline text-sm font-medium" id="profileText">Login</span>
                            <i data-lucide="chevron-down" class="h-4 w-4 ml-1 hidden sm:block"></i>
                        </button>

                        <!-- Profile Dropdown -->
                        <div id="profileDropdown"
                            class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-slate-900 rounded-xl shadow-lg border border-slate-200 dark:border-slate-800 py-1 z-50 transform origin-top-right transition-all duration-200">
                            <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800">
                                <p class="text-sm font-medium text-slate-900 dark:text-slate-100 truncate"
                                    id="dropdownName">
                                    Guest
                                </p>
                                <p class="text-xs text-slate-500 dark:text-slate-400 truncate" id="dropdownEmail">
                                    Not logged in
                                </p>
                            </div>
                            <button id="btnHeaderLogout"
                                class="w-full text-left px-4 py-2 text-sm text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-900/20 transition-colors flex items-center gap-2">
                                <i data-lucide="log-out" class="h-4 w-4"></i>
                                Log Out
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto p-4 sm:p-8 scroll-smooth">
                <!-- Grid -->
                <div id="notesGrid"
                    class="max-w-6xl mx-auto grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 pb-20 transition-all duration-300">
                    <!-- Cards go here -->
                </div>

                <!-- Task List View -->
                <div id="tasksView" class="hidden max-w-3xl mx-auto pb-20 space-y-6 transition-all duration-300">
                    <!-- Task Header -->
                    <div class="flex items-center justify-between">
                        <h2 class="text-2xl font-bold text-slate-800 dark:text-slate-100">
                            Tasks
                        </h2>
                        <button onclick="openAddTaskModal()"
                            class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-colors shadow-sm">
                            <i data-lucide="plus" class="h-4 w-4"></i>
                            Add Task
                        </button>
                    </div>

                    <!-- Progress Bar -->
                    <div
                        class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-4 border border-slate-200 dark:border-slate-700">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-sm font-medium text-slate-600 dark:text-slate-400">Progress</span>
                            <span id="taskProgressText" class="text-sm font-bold text-slate-800 dark:text-slate-200">0 /
                                0 completed</span>
                        </div>
                        <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2.5 overflow-hidden">
                            <div id="taskProgressBar"
                                class="bg-blue-600 h-2.5 rounded-full transition-all duration-500 ease-out"
                                style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- Filter Tabs -->
                    <div
                        class="flex space-x-2 border-b border-slate-200 dark:border-slate-800 pb-2 overflow-x-auto no-scrollbar">
                        <button onclick="setTaskFilter('all')" id="task-filter-all"
                            class="px-4 py-2 text-sm font-medium border-b-2 transition-colors whitespace-nowrap border-blue-600 text-blue-600 dark:text-blue-400">
                            All
                        </button>
                        <button onclick="setTaskFilter('today')" id="task-filter-today"
                            class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-colors whitespace-nowrap">
                            Today
                        </button>
                        <button onclick="setTaskFilter('upcoming')" id="task-filter-upcoming"
                            class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-colors whitespace-nowrap">
                            Upcoming
                        </button>
                        <button onclick="setTaskFilter('completed')" id="task-filter-completed"
                            class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-colors whitespace-nowrap">
                            Completed
                        </button>
                    </div>

                    <!-- Task List Container -->
                    <div id="taskList" class="space-y-3">
                        <!-- Task cards will be rendered here -->
                    </div>
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-slate-400">
                    <div
                        class="h-20 w-20 rounded-2xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex items-center justify-center mb-4">
                        <i data-lucide="inbox" class="h-8 w-8 text-slate-300 dark:text-slate-600"></i>
                    </div>
                    <p class="text-sm">Belum ada catatan.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Floating Action Button -->
    <button id="btnOpenAdd"
        class="fixed bottom-8 right-8 h-14 w-14 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-lg hover:shadow-blue-500/30 transition-all flex items-center justify-center group z-40">
        <i data-lucide="plus" class="h-6 w-6 group-hover:rotate-90 transition-transform duration-300"></i>
    </button>

    <!-- Add Modal -->
    <div id="addModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/20 backdrop-blur-sm p-4">
        <div id="addModalContent"
            class="w-full max-w-2xl bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 p-6 transform scale-95 opacity-0 transition-all duration-200">
            <h3 class="text-xl font-bold mb-4 text-slate-800 dark:text-slate-100">
                Catatan Baru
            </h3>

            <div class="space-y-4">
                <input id="noteTitle" type="text" placeholder="Judul" oninput="this.value = this.value.toUpperCase()"
                    class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors font-bold text-lg text-slate-800 dark:text-slate-100 uppercase" />
                <input id="noteTag" type="text" placeholder="Tag"
                    class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors text-sm font-semibold uppercase tracking-wide text-slate-500" />
                <textarea id="noteText" rows="6" placeholder="Tulis sesuatu..."
                    class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors resize-none text-slate-700 dark:text-slate-200"></textarea>

                <div class="flex gap-4 items-center">
                    <label
                        class="flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 cursor-pointer select-none hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                        <input id="pinNew" type="checkbox" class="accent-blue-600 h-4 w-4" />
                        <span class="text-sm font-medium text-slate-600 dark:text-slate-400">Pin</span>
                    </label>
                    <div class="flex-1"></div>
                    <button id="btnCloseAdd"
                        class="px-4 py-2 text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 font-medium transition-colors">
                        Batal
                    </button>
                    <button id="btnAdd"
                        class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-colors">
                        Simpan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- View Modal (Read Only) -->
    <div id="viewModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/20 backdrop-blur-sm p-4">
        <div id="viewModalContent"
            class="w-full max-w-2xl bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 p-6 transform scale-95 opacity-0 transition-all duration-200 max-h-[90vh] flex flex-col">
            <div class="flex items-start justify-between mb-4">
                <h3 id="viewTitle"
                    class="text-2xl font-bold text-slate-800 dark:text-slate-100 break-words flex-1 mr-4"></h3>
                <button id="btnCloseView"
                    class="p-2 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                    <i data-lucide="x" class="h-5 w-5"></i>
                </button>
            </div>

            <div class="flex items-center gap-2 mb-4">
                <span id="viewTag"
                    class="hidden px-2 py-1 rounded text-xs font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700 uppercase tracking-wide"></span>
                <span id="viewDate" class="text-xs text-slate-400"></span>
            </div>

            <!-- In-Note Search -->
            <div class="mb-4 flex gap-2 items-center">
                <div class="relative flex-1 group">
                    <input id="viewSearchInput" type="text" placeholder="Temukan di catatan ini..."
                        class="w-full pl-9 pr-4 py-2 bg-slate-50 dark:bg-slate-800/50 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl border border-transparent focus:bg-white dark:focus:bg-slate-900 focus:border-blue-500 dark:focus:border-blue-500 transition-all text-sm outline-none placeholder:text-slate-400/70" />
                    <i data-lucide="search"
                        class="absolute left-3 top-2.5 h-4 w-4 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                </div>
                <!-- Search Navigation -->
                <div id="viewSearchNav"
                    class="hidden items-center gap-1 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-transparent border-slate-200 dark:border-slate-800 px-2 py-1 transition-all">
                    <span id="viewSearchCount"
                        class="px-2 text-xs font-medium text-slate-500 dark:text-slate-400 min-w-[3rem] text-center">0/0</span>
                    <div class="w-px h-4 bg-slate-200 dark:bg-slate-700 mx-1"></div>
                    <button id="btnViewSearchPrev"
                        class="p-1.5 rounded-lg hover:bg-white dark:hover:bg-slate-700 text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 disabled:opacity-50 transition-all shadow-sm">
                        <i data-lucide="chevron-up" class="h-4 w-4"></i>
                    </button>
                    <button id="btnViewSearchNext"
                        class="p-1.5 rounded-lg hover:bg-white dark:hover:bg-slate-700 text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 disabled:opacity-50 transition-all shadow-sm">
                        <i data-lucide="chevron-down" class="h-4 w-4"></i>
                    </button>
                </div>
            </div>

            <div id="viewText"
                class="text-slate-700 dark:text-slate-300 leading-relaxed text-base overflow-y-auto pr-2 whitespace-pre-wrap">
            </div>

            <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-slate-100 dark:border-slate-800">
                <button id="btnViewEdit"
                    class="flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 hover:bg-blue-50 dark:hover:bg-blue-900/20 text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 rounded-xl transition-colors font-medium text-sm">
                    <i data-lucide="pencil" class="h-4 w-4"></i>
                    Edit
                </button>
            </div>
        </div>
    </div>

    <!-- Task View Modal (Read Only) -->
    <div id="taskViewModal"
        class="fixed inset-0 z-50 hidden items-center justify-center bg-black/20 backdrop-blur-sm p-4">
        <div id="taskViewModalContent"
            class="w-full max-w-lg bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 p-6 transform scale-95 opacity-0 transition-all duration-200 flex flex-col">
            <div class="flex items-start justify-between mb-2">
                <h3 id="taskViewTitle"
                    class="text-xl font-bold text-slate-800 dark:text-slate-100 break-words flex-1 mr-4"></h3>
                <button id="btnTaskCloseView"
                    class="p-2 -mt-2 -mr-2 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                    <i data-lucide="x" class="h-5 w-5"></i>
                </button>
            </div>

            <div class="flex flex-col gap-3 mb-6 mt-2 text-sm text-slate-600 dark:text-slate-400">
                <div class="flex items-center gap-2">
                    <i data-lucide="calendar" class="h-4 w-4"></i>
                    <span id="taskViewDate"></span>
                </div>
                <div id="taskViewReminderContainer"
                    class="flex items-center gap-2 hidden text-blue-500 dark:text-blue-400">
                    <i data-lucide="bell" class="h-4 w-4"></i>
                    <span id="taskViewReminder"></span>
                </div>
                <div id="taskViewRepeatContainer"
                    class="flex items-center gap-2 hidden text-emerald-500 dark:text-emerald-400">
                    <i data-lucide="repeat" class="h-4 w-4"></i>
                    <span id="taskViewRepeat"></span>
                </div>
            </div>

            <div id="taskViewSubtasks" class="space-y-2 mb-6 max-h-40 overflow-y-auto pr-2">
                <!-- Subtasks injected via JS -->
            </div>

            <div class="flex justify-end gap-3 mt-4 pt-4 border-t border-slate-100 dark:border-slate-800">
                <button id="btnTaskViewEdit"

        // ============ State ============
        const STORAGE_KEY = "modern_notes_v2";

            btnConfirmLogout: $("btnConfirmLogout"),
        };

        let editingId = null;

        // ============ Theme ============
        function initTheme() {
            const saved = localStorage.getItem(THEME_KEY);
            const updatedClass =
                saved === "dark" ||
                (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches);
            document.documentElement.classList.toggle("dark", updatedClass);
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle("dark");
            localStorage.setItem(THEME_KEY, isDark ? "dark" : "light");
        }

        // ============ Helpers ============
        function uid() {
            return (
                crypto?.randomUUID?.() ||
                Date.now().toString(36) + Math.random().toString(36).substr(2)
            );
        }

        function showToast(msg) {
            els.toastText.textContent = msg;
            els.toast.classList.remove("translate-y-20", "opacity-0");
            setTimeout(() => {
                els.toast.classList.add("translate-y-20", "opacity-0");
            }, 2000);
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(
                /[&<>'"]/g,
                (tag) =>
                    ({
                        "&": "&amp;",
                        "<": "&lt;",
                        ">": "&gt;",
                        "'": "&#39;",
                        '"': "&quot;",
                    })[tag],
            );
        }

        function formatDate(ms) {
            return new Date(ms).toLocaleDateString("id-ID", {
                day: "numeric",
                month: "short",
            });
        }

        // ============ Core Logic ============
        async function loadNotes() {
            try {
                // Check for localStorage data and migrate if exists
                const STORAGE_KEY = "modern_notes_v2";
                const hasLocalData = localStorage.getItem(STORAGE_KEY);

                if (hasLocalData) {
                    console.log("Found localStorage data, migrating to Firestore...");
                    const migratedCount = await window.migrateLocalToFirebase();
                    if (migratedCount > 0) {
                        showToast(`Migrated ${migratedCount} notes to cloud storage`);
                    }
                }

                // Migrate guest Firestore notes to logged-in user account
                if (window.migrateGuestNotesToAccount) {
                    await window.migrateGuestNotesToAccount();
                }

                // Load from Firestore
                notes = await window.loadNotesFromFirestore();
                // Load tasks (mock for now if no firestore backend yet, or reuse similar structure)
                // For this implementation we'll use LocalStorage or extending Firestore if available.
                // Assuming we use a similar pattern or just local storage for simplicity in this turn
                // unless user specified database. User said "menu task aja", implying visual separation.
                // Let's use LocalStorage for tasks to ensure it works immediately without DB schema changes.
                const storedTasks = localStorage.getItem(TASKS_KEY);
                if (storedTasks) tasks = JSON.parse(storedTasks);

                updateTags();
                render();
            } catch (error) {
                console.error("Error loading notes:", error);
                notes = [];
                tasks = [];
                updateTags();
                render();
            }
        }

        // Helper to save and re-render
        async function saveNotes() {
            updateTags();
            render();
        }

        window.updateAppBadge = async function () {
            if (window.Capacitor && window.Capacitor.Plugins.Badge) {
                try {
                    const Badge = window.Capacitor.Plugins.Badge;
                    const now = Date.now();
                    const count = tasks.filter(t =>
                        !t.completed && t.dueDate &&
                        (t.dueDate <= now || isToday(t.dueDate))
                    ).length;

                    if (count > 0) {
                        await Badge.set({ count });
                    } else {
                        await Badge.clear();
                    }
                } catch (e) {
                    console.error("App Badge Error:", e);
                }
            }
        };

        function saveTasks() {
            localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
            render();
            const uid = window.getCurrentUserId ? window.getCurrentUserId() : 'default_user';
            if (uid !== 'default_user' && window.updateAppBadge) {
                window.updateAppBadge();
            }
        }

        // ============ Task Modal Logic ============
        // ============ Timepicker Logic ============
        let timepickerTarget = null;
        let taskDueDate = null;
        let taskReminderTime = null;

        // Listen to Flowbite Datepicker change event
        let selectedTaskDate = new Date();
        if (els.inlineDatepicker) {
            els.inlineDatepicker.addEventListener("changeDate", (e) => {
                if (e.detail && e.detail.date) {
                    selectedTaskDate = new Date(e.detail.date);
                }
            });
        }

        if (els.btnTaskDate) {
            els.btnTaskDate.addEventListener("click", () => {
                timepickerTarget = "dueDate";
            });
        }

        // Tumbler JS Logic
        const hourTumbler = document.getElementById("hourTumbler");
        const minuteTumbler = document.getElementById("minuteTumbler");

        function populateTumbler(element, max, step) {
            if (!element) return;
            element.innerHTML = "";
            for (let i = 0; i < max; i += step) {
                const div = document.createElement("div");
                div.className =
                    "h-12 flex items-center justify-center snap-center text-3xl font-bold cursor-pointer text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-all select-none";
                div.textContent = i.toString().padStart(2, "0");
                div.dataset.val = i;

                div.addEventListener("click", () => {
                    div.scrollIntoView({ behavior: "smooth", block: "center" });
                });

                element.appendChild(div);
            }
        }

        function updateTumblerActiveState(element) {
            if (!element) return;
            const itemHeight = 48; // h-12 is 48px
            const index = Math.round(element.scrollTop / itemHeight);

            Array.from(element.children).forEach((child, i) => {
                if (i === index) {
                    child.classList.remove("text-slate-400", "scale-100");
                    child.classList.add(
                        "text-blue-600",
                        "scale-110",
                        "dark:text-blue-400",
                    );
                } else {
                    child.classList.add("text-slate-400", "scale-100");
                    child.classList.remove(
                        "text-blue-600",
                        "scale-110",
                        "dark:text-blue-400",
                    );
                }
            });
        }

        function getTumblerValue(element) {
            if (!element) return 0;
            const itemHeight = 48;
            const index = Math.round(element.scrollTop / itemHeight);
            const item = element.children[index];
            return item ? parseInt(item.dataset.val, 10) : 0;
        }

        function setTumblerValue(element, val) {
            if (!element) return;
            const itemHeight = 48;
            const items = Array.from(element.children);
            const index = items.findIndex(
                (item) => parseInt(item.dataset.val, 10) === val,
            );
            if (index !== -1) {
                element.scrollTo({ top: index * itemHeight, behavior: "instant" });
                updateTumblerActiveState(element);
            }
        }

        if (hourTumbler && minuteTumbler) {
            populateTumbler(hourTumbler, 24, 1);
            populateTumbler(minuteTumbler, 60, 1);

            // Setup scroll listeners
            hourTumbler.addEventListener("scroll", () =>
                updateTumblerActiveState(hourTumbler),
            );
            minuteTumbler.addEventListener("scroll", () =>
                updateTumblerActiveState(minuteTumbler),
            );

            // INIT values
            setTimeout(() => {
                setTumblerValue(hourTumbler, 12);
                setTumblerValue(minuteTumbler, 0);
            }, 100);
        }

        if (els.btnSaveTimepicker) {
            els.btnSaveTimepicker.addEventListener("click", () => {
                const hours = getTumblerValue(hourTumbler);
                const minutes = getTumblerValue(minuteTumbler);
                const finalDate = new Date(selectedTaskDate);
                finalDate.setHours(hours, minutes, 0, 0);

                const formatted = finalDate.toLocaleString("id-ID", {
                    day: "numeric",
                    month: "short",
                    year: "numeric",
                    hour: "2-digit",
                    minute: "2-digit",
                });

                if (timepickerTarget === "dueDate") {
                    taskDueDate = finalDate.getTime();
                    els.taskDateLabel.textContent = formatted;
                } else if (timepickerTarget === "reminder") {
                    taskReminderTime = finalDate.getTime();
                    els.taskReminderLabel.textContent = formatted;
                }
            });
        }

        if (els.btnSetToday) {
            els.btnSetToday.addEventListener("click", () => {
                const now = new Date();
                now.setSeconds(0, 0); // normalize

                // 1. Set our internal representation
                selectedTaskDate = now;
                setTumblerValue(hourTumbler, now.getHours());
                setTumblerValue(minuteTumbler, now.getMinutes());

                // 2. Force Flowbite's calendar to "Today" visually
                try {
                    let dp = els.inlineDatepicker.datepicker;
                    if (!dp && window.FlowbiteInstances) {
                        dp = window.FlowbiteInstances.getInstance(
                            "Datepicker",
                            "inlineDatepicker",
                        );
                    }
                    if (dp) {
                        dp.setDate(now);
                    } else {
                        // Fallback: Dispatch click on today's cell if we can't find instance
                        const todayCell = els.inlineDatepicker.querySelector(
                            ".datepicker-cell.today",
                        );
                        if (todayCell) todayCell.click();
                    }
                } catch (e) {
                    console.log("Datepicker update fallback", e);
                }

                // Force input value update
                els.inlineDatepicker.dispatchEvent(
                    new CustomEvent("changeDate", { detail: { date: now } }),
                );
            });
        }

        window.setRelativeReminder = function (offsetMinutes) {
            if (!taskDueDate) {
                showToast("Pilih Tenggat Waktu terlebih dahulu");
                return;
            }

            const due = new Date(taskDueDate);
            due.setMinutes(due.getMinutes() - offsetMinutes);
            taskReminderTime = due.getTime();

            let label = "";
            if (offsetMinutes === 0) label = "Saat tenggat waktu";
            else if (offsetMinutes === 5) label = "5 menit sebelumnya";
            else if (offsetMinutes === 10) label = "10 menit sebelumnya";
            else if (offsetMinutes === 30) label = "30 menit sebelumnya";
            else if (offsetMinutes === 60) label = "1 jam sebelumnya";
            else if (offsetMinutes === 1440) label = "1 hari sebelumnya";

            els.taskReminderLabel.textContent = label;

            // Collapse Flowbite dropdown
            els.btnTaskReminder.click();
        };

        let editingTaskId = null;
        let currentSubtasks = [];

        window.renderSubtasks = function () {
            const container = document.getElementById('subtasksContainer');
            if (!container) return;
            if (currentSubtasks.length === 0) {
                container.innerHTML = '<p class="text-xs text-slate-400 italic">Belum ada sub-tugas</p>';
                return;
            }
            container.innerHTML = currentSubtasks.map((st, i) => `
                <div class="flex items-center gap-2 group">
                    <input type="checkbox" ${st.completed ? 'checked' : ''} onclick="toggleSubtask(${i})" class="w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">
                    <span class="flex-1 text-sm ${st.completed ? 'text-slate-400 line-through' : 'text-slate-700 dark:text-slate-200'}">${escapeHtml(st.title)}</span>
                    <button type="button" onclick="removeSubtask(${i})" class="text-slate-400 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity">
                        <i data-lucide="x" class="h-4 w-4"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons({ nodes: container.querySelectorAll("[data-lucide]") });
        };

        window.addSubtask = function () {
            const input = document.getElementById('newSubtaskInput');
            const title = input.value.trim();
            if (!title) return;
            currentSubtasks.push({ title, completed: false });
            input.value = '';
            renderSubtasks();
        };

        window.toggleSubtask = function (index) {
            if (currentSubtasks[index]) {
                currentSubtasks[index].completed = !currentSubtasks[index].completed;
                renderSubtasks();
            }
        };

        window.removeSubtask = function (index) {
            currentSubtasks.splice(index, 1);
            renderSubtasks();
        };

        function openAddTaskModal(taskId = null) {
            editingTaskId = taskId;

            const titleEl = els.addTaskModalContent.querySelector("h3");
            if (titleEl)
                titleEl.textContent = taskId ? "Edit Tugas" : "Tambah Tugas";

            if (taskId && typeof taskId === "string") {
                const t = tasks.find((x) => x.id === taskId);
                if (t) {
                    els.taskTitle.value = t.title;
                    document.getElementById('taskRepeat').value = t.repeat || 'none';
                    currentSubtasks = t.subtasks ? JSON.parse(JSON.stringify(t.subtasks)) : [];
                    renderSubtasks();
                    if (t.dueDate) {
                        taskDueDate = t.dueDate;
                        const dateObj = new Date(t.dueDate);
                        selectedTaskDate = dateObj;
                        setTumblerValue(hourTumbler, dateObj.getHours());
                        setTumblerValue(minuteTumbler, dateObj.getMinutes());
                        els.taskDateLabel.textContent = dateObj.toLocaleString("id-ID", {
                            day: "numeric",
                            month: "short",
                            year: "numeric",
                            hour: "2-digit",
                            minute: "2-digit",
                        });

                        // Visually update the datepicker calendar
                        try {
                            let dp = els.inlineDatepicker.datepicker;
                            if (!dp && window.FlowbiteInstances) {
                                dp = window.FlowbiteInstances.getInstance(
                                    "Datepicker",
                                    "inlineDatepicker",
                                );
                            }
                            if (dp) dp.setDate(dateObj);
                        } catch (e) { }
                    }
                    if (t.reminder) {
                        taskReminderTime = t.reminder;
                        els.taskReminderLabel.textContent = new Date(
                            t.reminder,
                        ).toLocaleString("id-ID", {
                            day: "numeric",
                            month: "short",
                            year: "numeric",
                            hour: "2-digit",
                            minute: "2-digit",
                        });
                    }
                }
            }

            els.addTaskModal.classList.remove("hidden");
            els.addTaskModal.classList.add("flex");
            setTimeout(() => {
                els.addTaskModalContent.classList.remove("scale-95", "opacity-0");
                els.addTaskModalContent.classList.add("scale-100", "opacity-100");
                if (els.taskTitle) els.taskTitle.focus();
            }, 10);
        }

        function closeAddTaskModal() {
            els.addTaskModalContent.classList.remove("scale-100", "opacity-100");
            els.addTaskModalContent.classList.add("scale-95", "opacity-0");
            setTimeout(() => {
                els.addTaskModal.classList.add("hidden");
                els.addTaskModal.classList.remove("flex");
                // Reset
                els.taskTitle.value = "";
                taskDueDate = null;
                taskReminderTime = null;
                editingTaskId = null;
                els.taskDateLabel.textContent = "Pilih Waktu...";
                els.taskReminderLabel.textContent = "Belum Diatur";

                // Reset datepicker (visually tricky without Flowbite API, but we reset internal date)
                selectedTaskDate = new Date();
                const defaultTime = document.getElementById("12-pm");
                if (defaultTime) defaultTime.checked = true;

                document.getElementById('taskRepeat').value = 'none';
                currentSubtasks = [];
                document.getElementById('newSubtaskInput').value = '';
                renderSubtasks();
            }, 200);
        }

        els.btnCloseAddTask.addEventListener("click", closeAddTaskModal);

        els.btnSaveTask.addEventListener("click", async () => {
            const title = els.taskTitle.value.trim();

            if (!title || !taskDueDate)
                return showToast("Judul dan Tenggat Waktu harus diisi");

            let newTask;
            const repeatVal = document.getElementById('taskRepeat').value;
            const finalSubtasks = JSON.parse(JSON.stringify(currentSubtasks));

            if (editingTaskId) {
                newTask = tasks.find((x) => x.id === editingTaskId);
                if (!newTask) return closeAddTaskModal();
                newTask.title = title;
                newTask.dueDate = taskDueDate;
                newTask.reminder = taskReminderTime;
                newTask.repeat = repeatVal;
                newTask.subtasks = finalSubtasks;
            } else {
                newTask = {
                    title,
                    dueDate: taskDueDate,
                    reminder: taskReminderTime,
                    repeat: repeatVal,
                    subtasks: finalSubtasks,
                    completed: false,
                    createdAt: Date.now(),
                };
            }

            try {
                // Sync to Firestore first to get the real ID
                if (window.saveTaskToFirestore) {
                    const taskId = await window.saveTaskToFirestore(newTask);
                    newTask.id = taskId;
                } else {
                    if (!newTask.id) newTask.id = uid(); // fallback
                }

                if (!editingTaskId) {
                    tasks.unshift(newTask);
                }
                saveTasks();

                // Update UI immediately
                if (currentMode === "tasks") {
                    render();
                }
                showToast("Tugas disimpan");
                closeAddTaskModal();

                // Notification (client-side implementation handled elsewhere, but keeping schedule if supported)
                if (newTask.reminder) {
                    scheduleTaskNotification(newTask).catch(console.error);
                }
            } catch (error) {
                console.error("Error saving new task:", error);
                showToast("Gagal menyimpan tugas");
            }
        });

        // ============ Custom Confirm Logic ============
        function customConfirm(message) {
            return new Promise((resolve) => {
                els.confirmMessage.textContent = message;
                els.confirmModal.classList.remove("hidden");
                els.confirmModal.classList.add("flex");

                setTimeout(() => {
                    els.confirmModalContent.classList.remove("scale-95", "opacity-0");
                    els.confirmModalContent.classList.add("scale-100", "opacity-100");
                }, 10);

                const cleanup = () => {
                    els.confirmModalContent.classList.remove(
                        "scale-100",
                        "opacity-100",
                    );
                    els.confirmModalContent.classList.add("scale-95", "opacity-0");
                    setTimeout(() => {
                        els.confirmModal.classList.add("hidden");
                        els.confirmModal.classList.remove("flex");
                    }, 200);

                    els.btnConfirmCancel.removeEventListener("click", onCancel);
                    els.btnConfirmOk.removeEventListener("click", onOk);
                    els.confirmModal.removeEventListener("click", onOutsideClick);
                };

                const onCancel = () => {
                    cleanup();
                    resolve(false);
                };

                const onOk = () => {
                    cleanup();
                    resolve(true);
                };

                const onOutsideClick = (e) => {
                    if (e.target === els.confirmModal) onCancel();
                };

                els.btnConfirmCancel.addEventListener("click", onCancel);
                els.btnConfirmOk.addEventListener("click", onOk);
                els.confirmModal.addEventListener("click", onOutsideClick);
            });
        }

        // ============ Task Notification Logic ============
        async function scheduleTaskNotification(task) {
            if (!task.dueDate) return;
            try {
                if (window.Capacitor && window.Capacitor.Plugins.LocalNotifications) {
                    const LocalNotifications =
                        window.Capacitor.Plugins.LocalNotifications;
                    const permStatus = await LocalNotifications.requestPermissions();
                    if (permStatus.display === "granted") {
                        if (task.dueDate > Date.now()) {
                            const notifId = Math.abs(
                                task.id.split("").reduce((a, b) => {
                                    a = (a << 5) - a + b.charCodeAt(0);
                                    return a & a;
                                }, 0),
                            );
                            await LocalNotifications.schedule({
                                notifications: [
                                    {
                                        title: "Pengingat Tugas",
                                        body: task.title,
                                        id: notifId,
                                        schedule: { at: new Date(task.dueDate) },
                                        sound: null,
                                        attachments: null,
                                        actionTypeId: "",
                                        extra: null,
                                    },
                                ],
                            });
                            console.log(
                                "Task notification scheduled for",
                                new Date(task.dueDate),
                            );
                        }
                    }
                }
            } catch (e) {
                console.error("Schedule Notification Error:", e);
            }
        }

        async function cancelTaskNotification(taskId) {
            try {
                if (window.Capacitor && window.Capacitor.Plugins.LocalNotifications) {
                    const LocalNotifications =
                        window.Capacitor.Plugins.LocalNotifications;
                    const notifId = Math.abs(
                        taskId.split("").reduce((a, b) => {
                            a = (a << 5) - a + b.charCodeAt(0);
                            return a & a;
                        }, 0),
                    );
                    await LocalNotifications.cancel({
                        notifications: [{ id: notifId }],
                    });
                }
            } catch (e) {
                console.error("Cancel Notification Error:", e);
            }
        }

        // ============ Task Actions ============
        async function toggleTask(id) {
            const t = tasks.find((x) => x.id === id);
            if (t) {
                t.completed = !t.completed;
                saveTasks();

                // If completed, maybe cancel notification?
                if (t.completed) {
                    await cancelTaskNotification(id);
                    // Recurring Logic
                    if (t.repeat && t.repeat !== 'none' && t.dueDate) {
                        const newDueDate = new Date(t.dueDate);
                        if (t.repeat === 'daily') newDueDate.setDate(newDueDate.getDate() + 1);
                        else if (t.repeat === 'weekly') newDueDate.setDate(newDueDate.getDate() + 7);
                        else if (t.repeat === 'monthly') newDueDate.setMonth(newDueDate.getMonth() + 1);

                        let newReminder = null;
                        if (t.reminder) {
                            const offset = t.dueDate - t.reminder;
                            newReminder = newDueDate.getTime() - offset;
                        }

                        // Duplicate subtasks but uncheck them
                        const newSubtasks = t.subtasks ? t.subtasks.map(st => ({ ...st, completed: false })) : [];

                        const newTask = {
                            title: t.title,
                            dueDate: newDueDate.getTime(),
                            reminder: newReminder,
                            repeat: t.repeat,
                            subtasks: newSubtasks,
                            completed: false,
                            createdAt: Date.now()
                        };

                        try {
                            if (window.saveTaskToFirestore) {
                                newTask.id = await window.saveTaskToFirestore(newTask);
                            } else {
                                newTask.id = uid();
                            }

                            tasks.push(newTask);
                            saveTasks();
                            if (newTask.reminder) scheduleTaskNotification(newTask).catch(console.error);

                            const periodName = t.repeat === 'daily' ? 'Harian' : t.repeat === 'weekly' ? 'Mingguan' : 'Bulanan';
                            showToast(`Tugas selesai. Tugas berulang (${periodName}) dibuat`);
                            if (currentMode === "tasks") render();
                        } catch (err) {
                            console.error("Error creating recurring task", err);
                        }
                    }
                } else if (t.dueDate && t.dueDate > Date.now()) {
                    // Reschedule if un-completed and still valid
                    await scheduleTaskNotification(t);
                }

                // Sync to Firestore
                if (window.saveTaskToFirestore) {
                    window.saveTaskToFirestore(t).catch(console.error);
                }

                if (currentMode === "tasks" && !(t.completed && t.repeat && t.repeat !== 'none')) {
                    // re-render if we didn't already re-render inside the repeat block
                    render();
                }
            }
        }

        // Stores the last search query so openView can highlight it
        let lastSearchQuery = "";

        function highlightText(text, query) {
            if (!query) return escapeHtml(text);
            const re = new RegExp(
                `(${query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`,
                "gi",
            );
            return escapeHtml(text).replace(
                re,
                '<mark class="search-match bg-yellow-200 dark:bg-yellow-600/50 text-slate-900 dark:text-slate-100 rounded px-0.5 transition-colors">$1</mark>',
            );
        }

        function updateSearchNavigation(searchVal) {
            const marks = Array.from(els.viewText.querySelectorAll("mark.search-match"));
            totalSearchMatches = marks.length;

            if (totalSearchMatches > 0) {
                els.viewSearchNav.classList.remove("hidden");
                els.viewSearchNav.classList.add("flex");

                if (currentSearchMatchIndex >= totalSearchMatches || currentSearchMatchIndex < 0) {
                    currentSearchMatchIndex = 0;
                }

                els.viewSearchCount.textContent = `${currentSearchMatchIndex + 1}/${totalSearchMatches}`;

                marks.forEach((m, idx) => {
                    if (idx === currentSearchMatchIndex) {
                        m.classList.remove("bg-yellow-200", "dark:bg-yellow-600/50", "text-slate-900", "dark:text-slate-100");
                        m.classList.add("bg-orange-400", "dark:bg-orange-600", "text-white");
                        m.scrollIntoView({ behavior: "smooth", block: "center" });
                    } else {
                        m.classList.add("bg-yellow-200", "dark:bg-yellow-600/50", "text-slate-900", "dark:text-slate-100");
                        m.classList.remove("bg-orange-400", "dark:bg-orange-600", "text-white");
                    }
                });
            } else {
                els.viewSearchNav.classList.add("hidden");
                els.viewSearchNav.classList.remove("flex");
                els.viewSearchCount.textContent = "0/0";
                currentSearchMatchIndex = -1;
            }
        }

        // Auth UI Update
        window.updateAuthUI = function (user) {
            if (user) {
                // User is logged in
                const displayName = user.displayName || user.email.split("@")[0];
                els.profileText.textContent = displayName;

                // Update Dropdown Info
                if (els.dropdownName) els.dropdownName.textContent = displayName;
                if (els.dropdownEmail) els.dropdownEmail.textContent = user.email;

                // Update Sidebar
                if (els.sidebarProfileText)
                    els.sidebarProfileText.textContent = displayName;
                if (els.btnSidebarLogout)
                    els.btnSidebarLogout.classList.remove("hidden");

                // Update click handler for Profile Button to toggle dropdown instead of opening auth modal
                els.btnProfile.onclick = (e) => {
                    e.stopPropagation();
                    els.profileDropdown.classList.toggle("hidden");
                };

                // Sidebar Profile button also opens dropdown or goes to profile page?
                // For now, let's make it just show info or maybe nothing specific
                els.btnSidebarProfile.onclick = () => {
                    // Optional: Could open a profile settings modal in future
                    // for now just toggle the header dropdown logic or do nothing special
                    // effectively it acts as a display
                };
            } else {
                // User is logged into Guest Mode
                els.profileText.textContent = "Login";

                // Update Dropdown Info
                if (els.dropdownName) els.dropdownName.textContent = "Guest";
                if (els.dropdownEmail)
                    els.dropdownEmail.textContent = "Not logged in";

                // Update Sidebar
                if (els.sidebarProfileText)
                    els.sidebarProfileText.textContent = "Login";
                if (els.btnSidebarLogout)
                    els.btnSidebarLogout.classList.add("hidden");

                // Reset click handler to open auth modal
                els.btnProfile.onclick = openAuthModal;
                els.btnSidebarProfile.onclick = openAuthModal;

                // Hide dropdown if open
                els.profileDropdown.classList.add("hidden");
            }
            // Re-attach logout handlers to be safe (idempotent via onclick)
            if (els.btnSidebarLogout) els.btnSidebarLogout.onclick = handleLogout;
            if (els.btnHeaderLogout) els.btnHeaderLogout.onclick = handleLogout;
        };

        async function handleLogin() {
            const email = els.loginEmail.value.trim();
            const password = els.loginPassword.value;

            if (!email || !password) {
                els.loginError.textContent = "Email dan password harus diisi";
                els.loginError.classList.remove("hidden");
                return;
            }

            // Hide previous errors
            els.loginError.classList.add("hidden");

            // Disable button during login
            els.btnLoginSubmit.disabled = true;
            els.btnLoginSubmit.textContent = "Masuk...";

            const result = await window.loginUser(email, password);

            if (result.success) {
                showToast(`Selamat datang, ${result.user.email}!`);
                closeAuthModal();
                // Reload notes for the logged-in user
                await loadNotes();
            } else {
                // Show error message
                let errorMsg = "Login gagal";
                if (
                    result.error.includes("invalid-credential") ||
                    result.error.includes("user-not-found")
                ) {
                    errorMsg = "Email atau password salah";
                } else if (result.error.includes("too-many-requests")) {
                    errorMsg = "Terlalu banyak percobaan, coba lagi nanti";
                }
                els.loginError.textContent = errorMsg;
                els.loginError.classList.remove("hidden");
            }

            // Re-enable button
            els.btnLoginSubmit.disabled = false;
            els.btnLoginSubmit.textContent = "Masuk";
        }

        async function handleRegister() {
            const name = els.registerName.value.trim();
            const email = els.registerEmail.value.trim();
            const password = els.registerPassword.value;

            if (!name || !email || !password) {
                els.registerError.textContent = "Semua field harus diisi";
                els.registerError.classList.remove("hidden");
                return;
            }

            if (password.length < 6) {
                els.registerError.textContent = "Password minimal 6 karakter";
                els.registerError.classList.remove("hidden");
                return;
            }

            // Hide previous errors
            els.registerError.classList.add("hidden");

            // Disable button during registration
            els.btnRegisterSubmit.disabled = true;
            els.btnRegisterSubmit.textContent = "Mendaftar...";

            const result = await window.registerUser(name, email, password);

            if (result.success) {
                showToast(`Akun berhasil dibuat! Selamat datang, ${name}!`);
                closeAuthModal();
                // Reload notes + migrate guest notes to new account
                await loadNotes();
            } else {
                // Show error message
                let errorMsg = "Registrasi gagal";
                if (result.error.includes("email-already-in-use")) {
                    errorMsg = "Email sudah terdaftar";
                } else if (result.error.includes("invalid-email")) {
                    errorMsg = "Format email tidak valid";
                } else if (result.error.includes("weak-password")) {
                    errorMsg = "Password terlalu lemah";
                }
                els.registerError.textContent = errorMsg;
                els.registerError.classList.remove("hidden");
            }

            // Re-enable button
            els.btnRegisterSubmit.disabled = false;
            els.btnRegisterSubmit.textContent = "Daftar";
        }

        // ============ Edit Modal ============
        function openEdit(id) {
            const n = notes.find((x) => x.id === id);
            if (!n) return;
            editingId = id;
            if (els.editTitle) els.editTitle.value = n.title || "";
            els.editText.value = n.text;
            els.editTag.value = n.tag || "";
            els.editPinned.checked = n.pinned;

            els.editModal.classList.remove("hidden");
            els.editModal.classList.add("flex");
            // Animasi masuk
            setTimeout(() => {
                els.modalContent.classList.remove("scale-95", "opacity-0");
                els.modalContent.classList.add("scale-100", "opacity-100");
            }, 10);
        }

        function closeEdit() {
            els.modalContent.classList.remove("scale-100", "opacity-100");
            els.modalContent.classList.add("scale-95", "opacity-0");
            setTimeout(() => {
                els.editModal.classList.add("hidden");
                els.editModal.classList.remove("flex");
                editingId = null;
            }, 200);
        }

        async function saveEdit() {
            if (!editingId) return;
            const n = notes.find((n) => n.id === editingId);
            if (n) {
                try {
                    // Update local object
                    if (els.editTitle) n.title = els.editTitle.value.trim();
                    n.text = els.editText.value.trim();
                    n.tag = els.editTag.value.trim();
                    n.pinned = els.editPinned.checked;
                    n.isDraft = false; // Mark as active when saved
                    n.updatedAt = Date.now();

                    // Save to Firestore
                    await window.saveNoteToFirestore(n);

                    saveNotes();
                    closeEdit();
                    showToast("Perubahan disimpan");

                    // Switch from drafts to all if currently viewing drafts
                    if (currentFilter === "drafts") {
                        filterNotes("all");
                    }
                } catch (error) {
                    console.error("Error saving edit:", error);
                    showToast("Gagal menyimpan");
                }
            }
        }

        // ============ Navigation & Filtering ============
        function updateTags() {
            // Exclude drafts
            const tags = new Set(
                notes.filter((n) => !n.isDraft && n.tag).map((n) => n.tag),
            );
            const html = Array.from(tags)
                .map(
                    (tag) => `
        <button onclick="filterNotes('tag:${tag}')" 
          class="w-full flex items-center justify-between px-3 py-1.5 rounded-lg text-sm text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors ${currentFilter === "tag:" + tag ? "bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-200" : ""}">
          <span class="truncate"># ${escapeHtml(tag)}</span>
        </button>
      `,
                )
                .join("");
            els.tagsList.innerHTML = html;
        }

        function filterNotes(type) {
            currentFilter = type;

            // Mode Switching
            if (type === "tasks") {
                currentMode = "tasks";
                els.notesGrid.classList.add("hidden");
                els.tasksView.classList.remove("hidden");
                setTaskFilter("all"); // Reset task filter when entering tasks view
            } else {
                currentMode = "notes";
                els.notesGrid.classList.remove("hidden");
                els.tasksView.classList.add("hidden");
            }

            render();

            const btnClass =
                "w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors";

            // Update Active State Sidebar
            els.navAll.className = `${btnClass} ${type === "all"
                ? "bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300"
                : "text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800"
                }`;

            els.navPinned.className = `${btnClass} ${type === "pinned"
                ? "bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300"
                : "text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800"
                }`;

            if (els.navDrafts) {
                els.navDrafts.className = `${btnClass} ${type === "drafts"

                    }`;

            if (els.navTasks) {
                els.navTasks.className = `${btnClass} mt-4 ${type === "tasks"
                    ? "bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300"
                    : "text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800"
                    }`;
            }

            updateTags(); // Re-render tags to update active state
        }

        function getFiltered() {
            let filtered = [...notes];
            const q = els.searchInput.value.toLowerCase();

            // Search
            if (q) {
                filtered = filtered.filter(
                    (n) =>
                        n.text.toLowerCase().includes(q) ||
                        (n.title || "").toLowerCase().includes(q) ||
                        (n.tag || "").toLowerCase().includes(q),
                );
            }

            // Filter Type
            if (currentFilter === "pinned") {
                filtered = filtered.filter((n) => n.pinned && !n.isDraft);
            } else if (currentFilter === "drafts") {
                filtered = filtered.filter((n) => n.isDraft);
            } else if (currentFilter === "all") {
                filtered = filtered.filter((n) => !n.isDraft);
            } else if (currentFilter.startsWith("tag:")) {
                const tag = currentFilter.split(":")[1];
                filtered = filtered.filter((n) => n.tag === tag && !n.isDraft);
            }

            // Sort: Pinned first, then Newest
            return filtered.sort((a, b) => {
                if (a.pinned !== b.pinned) return b.pinned - a.pinned;
                return b.createdAt - a.createdAt;
            });
        }

        async function clearAll() {
            if (!notes.length) return;
            if (await customConfirm("Hapus SEMUA catatan?")) {
                try {
                    await window.clearAllNotesFromFirestore();
                    notes = [];
                    saveNotes();
                    showToast("Semua dihapus");
                } catch (error) {
                    console.error("Error clearing all notes:", error);
                    showToast("Gagal menghapus");
                }
            }
        }

        function exportJSON() {
            const blob = new Blob([JSON.stringify(notes, null, 2)], {
                type: "application/json",
            });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "notes-backup.json";
            a.click();
        }

        let currentTaskFilter = "all"; // all, today, upcoming, completed

        function setTaskFilter(filter) {
            currentTaskFilter = filter;

            // Update active tab styles
            const tabs = ["all", "today", "upcoming", "completed"];
            tabs.forEach((t) => {
                const el = $(`task-filter-${t}`);
                if (t === filter) {
                    el.className =
                        "px-4 py-2 text-sm font-medium border-b-2 transition-colors whitespace-nowrap border-blue-600 text-blue-600 dark:text-blue-400";
                } else {
                    el.className =
                        "px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-colors whitespace-nowrap";
                }
            });

            renderTasks();
        }

        function isToday(timestamp) {
            const today = new Date();
            const date = new Date(timestamp);
            return (
                date.getDate() === today.getDate() &&
                date.getMonth() === today.getMonth() &&
                date.getFullYear() === today.getFullYear()
            );
        }

        function isUpcoming(timestamp) {
            const today = new Date();
            today.setHours(23, 59, 59, 999);
            return timestamp > today.getTime();
        }

        function renderTasks() {
            // Calculate Progress
            const total = tasks.length;
            const completedCount = tasks.filter((t) => t.completed).length;
            const progressPercent =
                total === 0 ? 0 : Math.round((completedCount / total) * 100);

            els.taskProgressText.textContent = `${completedCount} / ${total} completed`;
            els.taskProgressBar.style.width = `${progressPercent}%`;

            // Filter Tasks
            let filteredTasks = tasks;
            if (currentTaskFilter === "today") {
                filteredTasks = tasks.filter(
                    (t) => t.dueDate && isToday(t.dueDate) && !t.completed,
                );
            } else if (currentTaskFilter === "upcoming") {
                filteredTasks = tasks.filter(
                    (t) => t.dueDate && isUpcoming(t.dueDate) && !t.completed,
                );
            } else if (currentTaskFilter === "completed") {
                filteredTasks = tasks.filter((t) => t.completed);
            }

            // Sort: Incomplete first, then by nearest dueDate
            filteredTasks.sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                if (!a.dueDate && !b.dueDate) return b.createdAt - a.createdAt;
                if (!a.dueDate) return 1;
                if (!b.dueDate) return -1;
                return a.dueDate - b.dueDate;
            });

            // Render Empty State if no tasks
            if (filteredTasks.length === 0) {
                els.taskList.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12 text-slate-400 border border-dashed border-slate-200 dark:border-slate-800 rounded-xl">
                        <i data-lucide="check-circle" class="h-8 w-8 text-slate-300 dark:text-slate-600 mb-2"></i>
                        <p class="text-sm">Tidak ada tugas dalam kategori ini.</p>
                    </div>`;
                lucide.createIcons({
                    nodes: els.taskList.querySelectorAll("[data-lucide]"),

            els.taskList.innerHTML = filteredTasks

                    const dateText = t.dueDate
                        ? new Date(t.dueDate).toLocaleDateString("id-ID", {
                            day: "numeric",
                            month: "short",
                            hour: "2-digit",
                            minute: "2-digit",
                        })
                        : "No Date";

                        t.dueDate &&
                        t.dueDate < Date.now() &&
                        !t.completed &&
                        !isToday(t.dueDate);

                    const dateColor = t.completed
                        ? "text-slate-400 dark:text-slate-500"
                        : isOverdue
                            ? "text-rose-500 dark:text-rose-400"
                            : "text-slate-500 dark:text-slate-400";

                    const textStyle = t.completed
                        ? "line-through text-slate-400 dark:text-slate-500"
                        : "text-slate-800 dark:text-slate-100 font-medium";
                    const wrapperStyle = t.completed
                        ? "opacity-60 bg-slate-50 dark:bg-slate-900"
                        : "bg-white dark:bg-slate-900";

                    const subtaskCount = t.subtasks ? t.subtasks.filter(s => s.completed).length : 0;
                    const subtaskTotal = t.subtasks ? t.subtasks.length : 0;
                    let subtaskHtml = '';
                    let subtaskListHtml = '';

                    if (subtaskTotal > 0) {
                        subtaskHtml = `
                        <button onclick="toggleTaskSubtasksUI(event, '${t.id}')" class="flex items-center gap-1 hover:bg-slate-100 dark:hover:bg-slate-800 px-1.5 py-0.5 rounded transition-colors text-slate-500 dark:text-slate-400">
                            <i data-lucide="list-checks" class="h-3.5 w-3.5"></i>
                            <span>${subtaskCount}/${subtaskTotal}</span>
                            <i id="subtasks-icon-${t.id}" data-lucide="chevron-down" class="h-3.5 w-3.5 transition-transform duration-200" style="${subIconStyle}"></i>
                        </button>`;

                                <input type="checkbox" ${t.completed ? 'disabled ' : ''}${st.completed ? 'checked' : ''} onchange="toggleIndSubtask('${t.id}', ${i})" class="w-3.5 h-3.5 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">

                        : '';

                        <!-- Left Action (Swipe Right) - Complete -->

                    <!-- Foreground Card (Swipeable) -->
                    <div onclick="if(Math.abs(window.lastSwipeDelta || 0) < 10) openTaskView('${t.id}')"

                        <div class="flex items-center gap-4 p-4 w-full">
                            <div class="flex items-center justify-center pt-0.5 relative z-20">
                                <label class="relative flex items-center p-1 rounded-full cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                                    <input type="checkbox" ${t.completed ? "checked" : ""} onclick="event.stopPropagation(); toggleTask('${t.id}')"
                                        class="peer relative appearance-none w-5 h-5 border-2 border-slate-300 dark:border-slate-600 rounded cursor-pointer transition-all checked:border-blue-600 checked:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500/30">

                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor" stroke="currentColor" stroke-width="1">
