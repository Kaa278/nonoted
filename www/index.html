<!doctype html>
<html lang="id" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nonoted</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22white%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><circle cx=%2212%22 cy=%2212%22 r=%2212%22 fill=%22%232563eb%22 stroke=%22none%22/><g transform=%22translate(4,4) scale(0.66)%22><path d=%22M13.4 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7.4%22/><path d=%22M2 6h4%22/><path d=%22M16 2v4%22/><path d=%22m21.2 8.8-9 9a2 1.5 2 1.5 0 0 0 0 3l-1 1-1-1a2.1.5 2.1.5 0 0 0 0-3l9-9a2 2 0 0 1 2.8 2.8Z%22/></g></svg>">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide (Outline icons) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.3);
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.5);
        }

        .fade-in {
            animation: fadeIn .2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hide scrollbar for sidebar on mobile if needed */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* GPU compositing for smooth modal animations */
        #addModal,
        #editModal,
        #viewModal,
        #authModal,
        #logoutModal {
            will-change: opacity;
        }

        #addModalContent,
        #modalContent,
        #viewModalContent,
        #authModalContent,
        #logoutModalContent {
            will-change: transform, opacity;
        }

        /* Limit reflow scope to the notes grid */
        #notesGrid {
            contain: layout style;
        }
    </style>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-white text-slate-800 dark:bg-slate-950 dark:text-slate-200 transition-colors duration-300 antialiased selection:bg-blue-500/30 selection:text-blue-600 dark:selection:text-blue-300">

    <div class="flex h-screen w-full overflow-hidden">

        <!-- Sidebar -->
        <aside id="sidebar"
            class="w-64 flex-col border-r border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50 hidden md:flex fixed md:relative inset-y-0 left-0 z-50 h-full">
            <div class="h-16 flex items-center px-6 border-b border-slate-200 dark:border-slate-800">
                <div class="flex items-center gap-2 font-bold text-lg tracking-tight">
                    <div class="h-8 w-8 rounded-lg bg-blue-600 flex items-center justify-center text-white">
                        <i data-lucide="notebook-pen" class="h-4 w-4"></i>
                    </div>
                    <span>Nonoted</span>
                </div>
                <!-- Close Sidebar (Mobile) -->
                <button id="btnCloseSidebar"
                    class="md:hidden ml-auto p-2 text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">
                    <i data-lucide="x" class="h-5 w-5"></i>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-6 bg-white dark:bg-slate-950/50 md:bg-transparent">
                <!-- Main Nav -->
                <nav class="space-y-1">
                    <button onclick="filterNotes('all')" id="nav-all"
                        class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300 transition-colors">
                        <i data-lucide="layers" class="h-4 w-4"></i>
                        Semua Catatan
                    </button>
                    <button onclick="filterNotes('pinned')" id="nav-pinned"
                        class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="pin" class="h-4 w-4"></i>
                        Pinned
                    </button>
                    <button onclick="filterNotes('drafts')" id="nav-drafts"
                        class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="clipboard-pen" class="h-4 w-4"></i>
                        Drafts
                    </button>
                </nav>

                <!-- Tags -->
                <div>
                    <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 px-3">Tags</div>
                    <nav id="tagsList" class="space-y-1">
                        <!-- Dynamic tags will go here -->
                    </nav>
                </div>
            </div>

            <div
                class="p-4 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950/50 md:bg-transparent space-y-1">
                <button id="btnSidebarProfile" onclick="openAuthModal()"
                    class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <i data-lucide="user" class="h-4 w-4"></i>
                    <span id="sidebarProfileText">Profile</span>
                </button>
                <button id="btnSidebarLogout"
                    class="hidden w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-900/20 transition-colors">
                    <i data-lucide="log-out" class="h-4 w-4"></i>
                    Log Out
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full relative">
            <!-- Header -->
            <header
                class="h-16 flex items-center justify-between px-4 sm:px-8 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-sm z-10">
                <div class="flex items-center gap-4 flex-1">
                    <button id="btnMenu"
                        class="md:hidden p-2 -ml-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg">
                        <i data-lucide="menu" class="h-5 w-5"></i>
                    </button>
                    <div class="relative w-full max-w-md">
                        <i data-lucide="search"
                            class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400 z-10"></i>
                        <input id="searchInput" type="text" placeholder="Cari catatan..."
                            class="w-full pl-9 pr-4 py-2 bg-slate-100 dark:bg-slate-900 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500/50 outline-none transition-all placeholder:text-slate-500 text-slate-700 dark:text-slate-200"
                            autocomplete="off">
                        <!-- Search Results Dropdown -->
                        <div id="searchDropdown"
                            class="hidden absolute top-full left-0 right-0 mt-2 bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800 z-[200] max-h-[420px] overflow-y-auto">
                            <div id="searchDropdownList" class="py-2"></div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-3 ml-4">
                    <div
                        class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-900 text-xs font-medium text-slate-500">
                        <span id="countNotes">0</span> Catatan
                    </div>
                    <button id="themeToggle"
                        class="p-2 rounded-xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                        title="Toggle Theme">
                        <i data-lucide="moon" class="h-5 w-5 hidden dark:block"></i>
                        <i data-lucide="sun" class="h-5 w-5 block dark:hidden"></i>
                    </button>
                    <button id="btnExport"
                        class="p-2 rounded-xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                        title="Export">
                        <i data-lucide="download" class="h-5 w-5"></i>
                    </button>
                    <div class="relative">
                        <button id="btnProfile"
                            class="flex items-center gap-2 px-3 py-2 rounded-xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                            title="Profile">
                            <i data-lucide="user-circle" class="h-5 w-5"></i>
                            <span class="hidden sm:inline text-sm font-medium" id="profileText">Login</span>
                            <i data-lucide="chevron-down" class="h-4 w-4 ml-1 hidden sm:block"></i>
                        </button>

                        <!-- Profile Dropdown -->
                        <div id="profileDropdown"
                            class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-slate-900 rounded-xl shadow-lg border border-slate-200 dark:border-slate-800 py-1 z-50 transform origin-top-right transition-all duration-200">
                            <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800">
                                <p class="text-sm font-medium text-slate-900 dark:text-slate-100 truncate"
                                    id="dropdownName">Guest</p>
                                <p class="text-xs text-slate-500 dark:text-slate-400 truncate" id="dropdownEmail">Not
                                    logged in</p>
                            </div>
                            <button id="btnHeaderLogout"
                                class="w-full text-left px-4 py-2 text-sm text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-900/20 transition-colors flex items-center gap-2">
                                <i data-lucide="log-out" class="h-4 w-4"></i>
                                Log Out
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto p-4 sm:p-8 scroll-smooth">

                <!-- Grid -->
                <div id="notesGrid"
                    class="max-w-6xl mx-auto grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 pb-20">
                    <!-- Cards go here -->
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-slate-400">
                    <div
                        class="h-20 w-20 rounded-2xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex items-center justify-center mb-4">
                        <i data-lucide="inbox" class="h-8 w-8 text-slate-300 dark:text-slate-600"></i>
                    </div>
                    <p class="text-sm">Belum ada catatan.</p>
                </div>

            </div>
        </main>

    </div>

    <!-- Floating Action Button -->
    <button id="btnOpenAdd"
        class="fixed bottom-8 right-8 h-14 w-14 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-lg hover:shadow-blue-500/30 transition-all flex items-center justify-center group z-40">
        <i data-lucide="plus" class="h-6 w-6 group-hover:rotate-90 transition-transform duration-300"></i>
    </button>

    <!-- Add Modal -->
    <div id="addModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/20 backdrop-blur-sm p-4">
        <div id="addModalContent"
            class="w-full max-w-2xl bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 p-6 transform scale-95 opacity-0 transition-all duration-200">
            <h3 class="text-xl font-bold mb-4 text-slate-800 dark:text-slate-100">Catatan Baru</h3>

            <div class="space-y-4">
                <input id="noteTitle" type="text" placeholder="Judul" oninput="this.value = this.value.toUpperCase()"
                    class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors font-bold text-lg text-slate-800 dark:text-slate-100 uppercase">
                <input id="noteTag" type="text" placeholder="Tag"
                    class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors text-sm font-semibold uppercase tracking-wide text-slate-500">
                <textarea id="noteText" rows="6" placeholder="Tulis sesuatu..."
                    class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors resize-none text-slate-700 dark:text-slate-200"></textarea>

                <div class="flex gap-4 items-center">
                    <label
                        class="flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 cursor-pointer select-none hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                        <input id="pinNew" type="checkbox" class="accent-blue-600 h-4 w-4">
                        <span class="text-sm font-medium text-slate-600 dark:text-slate-400">Pin</span>
                    </label>
                    <div class="flex-1"></div>
                    <button id="btnCloseAdd"
                        class="px-4 py-2 text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 font-medium transition-colors">
                        Batal
                    </button>
                    <button id="btnAdd"
                        class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-colors">
                        Simpan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- View Modal (Read Only) -->
    <div id="viewModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/20 backdrop-blur-sm p-4">
        <div id="viewModalContent"
            class="w-full max-w-2xl bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 p-6 transform scale-95 opacity-0 transition-all duration-200 max-h-[90vh] flex flex-col">
            <div class="flex items-start justify-between mb-4">
                <h3 id="viewTitle"
                    class="text-2xl font-bold text-slate-800 dark:text-slate-100 break-words flex-1 mr-4"></h3>
                <button id="btnCloseView"
                    class="p-2 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                    <i data-lucide="x" class="h-5 w-5"></i>
                </button>
            </div>

            <div class="flex items-center gap-2 mb-6">
                <span id="viewTag"
                    class="hidden px-2 py-1 rounded text-xs font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700 uppercase tracking-wide"></span>
                <span id="viewDate" class="text-xs text-slate-400"></span>
            </div>

            <div id="viewText"
                class="text-slate-700 dark:text-slate-300 leading-relaxed text-base overflow-y-auto pr-2 whitespace-pre-wrap">
            </div>

            <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-slate-100 dark:border-slate-800">
                <button id="btnViewEdit"
                    class="flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 hover:bg-blue-50 dark:hover:bg-blue-900/20 text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 rounded-xl transition-colors font-medium text-sm">
                    <i data-lucide="pencil" class="h-4 w-4"></i>
                    Edit
                </button>
            </div>
        </div>
    </div>

    </div>
    </main>

    </div>

    <!-- Toast -->
    <div id="toast"
        class="fixed bottom-6 right-6 z-50 bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 translate-y-20 opacity-0 transition-all duration-300">
        <i data-lucide="check-circle-2" class="h-5 w-5 text-emerald-500 dark:text-emerald-600"></i>
        <span id="toastText" class="text-sm font-medium">Notification</span>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-950/20 dark:bg-black/60 backdrop-blur-sm transition-opacity"
            id="modalBackdrop"></div>
        <div class="relative w-full max-w-lg bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800 p-6 scale-95 opacity-0 transition-all duration-200"
            id="modalContent">

            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-lg">Edit Catatan</h3>
                <button id="btnCloseModal"
                    class="p-2 -mr-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <i data-lucide="x" class="h-5 w-5"></i>
                </button>
            </div>

            <div class="space-y-4">
                <input id="editTitle" type="text" placeholder="Judul (opsional)"
                    oninput="this.value = this.value.toUpperCase()"
                    class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors font-bold text-lg text-slate-800 dark:text-slate-100 uppercase">
                <textarea id="editText" rows="6"
                    class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors resize-none text-slate-700 dark:text-slate-200"></textarea>

                <div class="flex gap-4">
                    <div class="flex-1">
                        <input id="editTag" type="text" placeholder="Tag"
                            class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors text-sm">
                    </div>
                    <label
                        class="flex items-center gap-2 px-3 rounded-xl border border-slate-200 dark:border-slate-700 cursor-pointer select-none hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                        <input id="editPinned" type="checkbox" class="accent-blue-600 h-4 w-4">
                        <span class="text-sm">Pin</span>
                    </label>
                </div>

                <div class="flex justify-end pt-2">
                    <button id="btnSaveEdit"
                        class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-colors">
                        Simpan
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Auth Modal (Login/Register) -->
    <div id="authModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 items-center justify-center p-4">
        <div id="authModalContent"
            class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-md scale-95 opacity-0 transition-all duration-300">

            <!-- Tabs -->
            <div class="flex border-b border-slate-200 dark:border-slate-800">
                <button id="tabLogin"
                    class="flex-1 px-6 py-4 font-medium text-blue-600 dark:text-blue-400 border-b-2 border-blue-600 dark:border-blue-400 transition-colors">
                    Login
                </button>
                <button id="tabRegister"
                    class="flex-1 px-6 py-4 font-medium text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300 transition-colors">
                    Daftar
                </button>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Email</label>
                    <input id="loginEmail" type="email" placeholder="nama@email.com"
                        class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Password</label>
                    <input id="loginPassword" type="password" placeholder="••••••••"
                        class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors">
                </div>
                <div id="loginError"
                    class="hidden p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-sm text-red-600 dark:text-red-400">
                </div>
                <div class="flex gap-3 pt-2">
                    <button id="btnCancelAuth"
                        class="flex-1 px-6 py-2.5 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-medium rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        Batal
                    </button>
                    <button id="btnLoginSubmit"
                        class="flex-1 px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-colors">
                        Masuk
                    </button>
                </div>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="hidden p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Nama</label>
                    <input id="registerName" type="text" placeholder="Nama lengkap"
                        class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Email</label>
                    <input id="registerEmail" type="email" placeholder="nama@email.com"
                        class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Password</label>
                    <input id="registerPassword" type="password" placeholder="Minimal 6 karakter"
                        class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors">
                </div>
                <div id="registerError"
                    class="hidden p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-sm text-red-600 dark:text-red-400">
                </div>
                <div class="flex gap-3 pt-2">
                    <button id="btnCancelRegister"
                        class="flex-1 px-6 py-2.5 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-medium rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        Batal
                    </button>
                    <button id="btnRegisterSubmit"
                        class="flex-1 px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-colors">
                        Daftar
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Logout Confirmation Modal -->
    <div id="logoutModal" class="fixed inset-0 z-[9999] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm transition-opacity" id="logoutModalBackdrop">
        </div>
        <div class="relative w-full max-w-sm bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800 p-6 transform scale-95 opacity-0 transition-all duration-200"
            id="logoutModalContent">

                <div

                </p>

                <button id="btnCancelLogout"
                    class="flex-1 px-4 py-2.5 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-medium rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                    Batal
                </button>
                <button id="btnConfirmLogout"
                    class="flex-1 px-4 py-2.5 bg-red-600 hover:bg-red-700 text-white font-medium rounded-xl transition-colors shadow-lg shadow-red-500/20">
                    Keluar
                </button>

    </div>

    <script>
        // ============ State ============
        const STORAGE_KEY = "modern_notes_v2";
        const THEME_KEY = "theme_preference";
        let notes = [];
        let currentFilter = 'all';

        const $ = (id) => document.getElementById(id);
        const els = {
            noteTitle: $("noteTitle"),
            noteText: $("noteText"),
            noteTag: $("noteTag"),
            pinNew: $("pinNew"),
            btnAdd: $("btnAdd"),
            notesGrid: $("notesGrid"),
            emptyState: $("emptyState"),
            countNotes: $("countNotes"),
            searchInput: $("searchInput"),
            searchDropdown: $("searchDropdown"),
            searchDropdownList: $("searchDropdownList"),
            themeToggle: $("themeToggle"),
            btnExport: $("btnExport"),
            toast: $("toast"),
            toastText: $("toastText"),
            editModal: $("editModal"),
            modalContent: $("modalContent"),
            btnCloseModal: $("btnCloseModal"),
            editTitle: $("editTitle"),
            editText: $("editText"),
            editTag: $("editTag"),
            editPinned: $("editPinned"),
            btnSaveEdit: $("btnSaveEdit"),
            tagsList: $("tagsList"),
            navAll: $("nav-all"),
            navPinned: $("nav-pinned"),
            // Add Modal
            btnOpenAdd: $("btnOpenAdd"),
            addModal: $("addModal"),
            addModalContent: $("addModalContent"),
            btnCloseAdd: $("btnCloseAdd"),
            // View Modal
            viewModal: $("viewModal"),
            viewModalContent: $("viewModalContent"),
            btnCloseView: $("btnCloseView"),
            viewTitle: $("viewTitle"),
            viewText: $("viewText"),
            viewTag: $("viewTag"),
            viewDate: $("viewDate"),
            btnViewEdit: $("btnViewEdit"),
            // Nav
            navDrafts: $("nav-drafts"),
            // Auth
            btnProfile: $("btnProfile"),
            profileDropdown: $("profileDropdown"),
            dropdownName: $("dropdownName"),
            dropdownEmail: $("dropdownEmail"),
            btnSidebarProfile: $("btnSidebarProfile"),
            sidebarProfileText: $("sidebarProfileText"),
            btnSidebarLogout: $("btnSidebarLogout"),
            btnHeaderLogout: $("btnHeaderLogout"),
            profileText: $("profileText"),
            authModal: $("authModal"),
            authModalContent: $("authModalContent"),
            tabLogin: $("tabLogin"),
            tabRegister: $("tabRegister"),
            loginForm: $("loginForm"),
            registerForm: $("registerForm"),
            loginEmail: $("loginEmail"),
            loginPassword: $("loginPassword"),
            loginError: $("loginError"),
            registerName: $("registerName"),
            registerEmail: $("registerEmail"),
            registerPassword: $("registerPassword"),
            registerError: $("registerError"),
            btnCancelAuth: $("btnCancelAuth"),
            btnCancelRegister: $("btnCancelRegister"),
            btnLoginSubmit: $("btnLoginSubmit"),
            btnRegisterSubmit: $("btnRegisterSubmit"),
            // Logout Modal
            logoutModal: $("logoutModal"),
            logoutModalContent: $("logoutModalContent"),
            btnCancelLogout: $("btnCancelLogout"),
            btnConfirmLogout: $("btnConfirmLogout"),
        };

        let editingId = null;

        // ============ Theme ============
        function initTheme() {
            const saved = localStorage.getItem(THEME_KEY);
            const updatedClass = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.toggle('dark', updatedClass);
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
        }

        // ============ Helpers ============
        function uid() {
            return (crypto?.randomUUID?.() || Date.now().toString(36) + Math.random().toString(36).substr(2));
        }

        function showToast(msg) {
            els.toastText.textContent = msg;
            els.toast.classList.remove("translate-y-20", "opacity-0");
            setTimeout(() => {
                els.toast.classList.add("translate-y-20", "opacity-0");
            }, 2000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag]));
        }

        function formatDate(ms) {
            return new Date(ms).toLocaleDateString('id-ID', {
                day: 'numeric',
                month: 'short'
            });
        }

        // ============ Core Logic ============
        async function loadNotes() {
            try {
                // Check for localStorage data and migrate if exists
                const STORAGE_KEY = "modern_notes_v2";
                const hasLocalData = localStorage.getItem(STORAGE_KEY);

                if (hasLocalData) {
                    console.log("Found localStorage data, migrating to Firestore...");
                    const migratedCount = await window.migrateLocalToFirebase();
                    if (migratedCount > 0) {
                        showToast(`Migrated ${migratedCount} notes to cloud storage`);
                    }
                }

                // Migrate guest Firestore notes to logged-in user account
                if (window.migrateGuestNotesToAccount) {
                    await window.migrateGuestNotesToAccount();
                }

                // Load from Firestore
                notes = await window.loadNotesFromFirestore();
                updateTags();
                render();
            } catch (error) {
                console.error("Error loading notes:", error);
                notes = [];
                updateTags();
                render();
            }
        }

        // Helper to save and re-render (no longer uses localStorage)
        async function saveNotes() {
            updateTags();
            render();
        }

        function openAddModal() {
            els.addModal.classList.remove("hidden");
            els.addModal.classList.add("flex");
            // Animation
            setTimeout(() => {
                els.addModalContent.classList.remove("scale-95", "opacity-0");
                els.addModalContent.classList.add("scale-100", "opacity-100");
                if (els.noteTitle) els.noteTitle.focus();
            }, 10);
        }

        function closeAddModal() {
            // Check if there is content
            const text = els.noteText.value.trim();
            const title = els.noteTitle?.value.trim() || "";

            // If content exists, save as draft
            if (text || title) {
                notes.unshift({
                    id: uid(),
                    title,
                    text,
                    tag: els.noteTag.value.trim(),
                    pinned: false,
                    isDraft: true, // Mark as draft
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                });
                saveNotes();
                showToast("Disimpan ke Draft");
            }

            // Reset inputs
            if (els.noteTitle) els.noteTitle.value = "";
            els.noteText.value = "";
            els.noteTag.value = "";
            els.pinNew.checked = false;

            els.addModalContent.classList.remove("scale-100", "opacity-100");
            els.addModalContent.classList.add("scale-95", "opacity-0");
            setTimeout(() => {
                els.addModal.classList.add("hidden");
                els.addModal.classList.remove("flex");
            }, 200);
        }

        async function addNote() {
            const text = els.noteText.value.trim();
            const title = els.noteTitle?.value.trim() || "";

            if (!text && !title) return showToast("Kosong?");

            const newNote = {
                title,
                text,
                tag: els.noteTag.value.trim(),
                pinned: els.pinNew.checked,
                isDraft: false,
                createdAt: Date.now(),
                updatedAt: Date.now()
            };

            try {
                // Save to Firestore and get the new ID
                const noteId = await window.saveNoteToFirestore(newNote);
                newNote.id = noteId;

                // Add to local array
                notes.unshift(newNote);
                saveNotes();

                // Clear inputs
                if (els.noteTitle) els.noteTitle.value = "";
                els.noteText.value = "";
                els.noteTag.value = "";
                els.pinNew.checked = false;

                // Close modal
                els.addModalContent.classList.remove("scale-100", "opacity-100");
                els.addModalContent.classList.add("scale-95", "opacity-0");
                setTimeout(() => {
                    els.addModal.classList.add("hidden");
                    els.addModal.classList.remove("flex");
                }, 200);

                showToast("Berhasil disimpan");
            } catch (error) {
                console.error("Error adding note:", error);
                showToast("Gagal menyimpan");
            }
        }

        // ... (deleteNote, togglePin remains same) ...

        // ============ View Modal ============
        // Stores the last search query so openView can highlight it
        let lastSearchQuery = '';

        function highlightText(text, query) {
            if (!query) return escapeHtml(text);
            const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return escapeHtml(text).replace(re, '<mark class="bg-yellow-200 dark:bg-yellow-600/50 text-slate-900 dark:text-slate-100 rounded px-0.5">$1</mark>');
        }

        function openView(id) {
            const n = notes.find(x => x.id === id);
            if (!n) return;

            const q = lastSearchQuery;

            els.viewTitle.textContent = n.title || "(Tanpa Judul)";
            // Highlight search term in body text
            if (q) {
                els.viewText.innerHTML = highlightText(n.text, q).replace(/\n/g, '<br>');
            } else {
                els.viewText.textContent = n.text;
            }
            els.viewDate.textContent = formatDate(n.createdAt);

            if (n.tag) {
                els.viewTag.textContent = n.tag;
                els.viewTag.classList.remove("hidden");
            } else {
                els.viewTag.classList.add("hidden");
            }

            // Edit Button Action
            els.btnViewEdit.onclick = () => {
                closeView();
                openEdit(id);
            };

            els.viewModal.classList.remove("hidden");
            els.viewModal.classList.add("flex");
            setTimeout(() => {
                els.viewModalContent.classList.remove("scale-95", "opacity-0");
                els.viewModalContent.classList.add("scale-100", "opacity-100");

                // Scroll to first highlighted match if coming from search
                if (lastSearchQuery) {
                    setTimeout(() => {
                        const firstMark = els.viewModalContent.querySelector('mark');
                        if (firstMark) {
                            firstMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }, 150);
                }
            }, 10);
        }

        function closeView() {
            els.viewModalContent.classList.remove("scale-100", "opacity-100");
            els.viewModalContent.classList.add("scale-95", "opacity-0");
            setTimeout(() => {
                els.viewModal.classList.add("hidden");
                els.viewModal.classList.remove("flex");
                lastSearchQuery = ''; // clear highlight after closing
            }, 200);
        }

        // ... (openEdit, closeEdit, saveEdit) ...

        async function deleteNote(id) {
            if (!confirm("Hapus catatan ini?")) return;

            try {
                await window.deleteNoteFromFirestore(id);
                notes = notes.filter(n => n.id !== id);
                saveNotes();
                showToast("Terhapus");
            } catch (error) {
                console.error("Error deleting note:", error);
                showToast("Gagal menghapus");
            }
        }




        // Helper for child window to callback
        window.updateNoteContent = async function (id, title, text, tag) {
            const index = notes.findIndex(x => x.id === id);
            if (index !== -1) {
                try {
                    notes[index] = {
                        ...notes[index],
                        title,
                        text,
                        tag: tag !== undefined ? tag : notes[index].tag,
                        isDraft: false,
                        updatedAt: Date.now()
                    };

                    // Save to Firestore
                    await window.saveNoteToFirestore(notes[index]);

                    saveNotes();
                    showToast("Berhasil Disimpan & Aktif!");

                    // Kalau lagi di tab Drafts, pindah ke All
                    if (currentFilter === 'drafts') {
                        filterNotes('all');
                    }
                } catch (error) {
                    console.error("Error updating note:", error);
                    showToast("Gagal menyimpan");
                }
            }
        };

        function popOutNote(id) {
            const n = notes.find(x => x.id === id);
            if (!n) return;

            const w = window.open("", "_blank", "width=400,height=500,left=100,top=100");
            if (!w) return;

            const title = n.title || "";
            const text = n.text || "";
            const tag = n.tag || "";
            const isDark = document.documentElement.classList.contains('dark');

            // Set title
            w.document.title = title || "Catatan Mini";

            // Colors (Slate 950 / White)
            const bg = isDark ? '#020617' : '#ffffff';
            const fg = isDark ? '#e2e8f0' : '#1e293b';
            const inputBg = isDark ? '#1e293b' : '#f8fafc';
            const border = isDark ? '#334155' : '#e2e8f0';
            const tagColor = isDark ? '#94a3b8' : '#64748b';

            const style = w.document.createElement('style');
            style.textContent = `
                @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
                body {
                    margin: 0;
                    padding: 0;
                    background-color: ${bg};
                    color: ${fg};
                    font-family: 'Inter', sans-serif;
                    height: 100vh;
                    display: flex;
                    flex-direction: column;
                    overflow: hidden;
                }
                .header {
                    padding: 1rem;
                    border-bottom: 1px solid ${border};
                    display: flex;
                    flex-direction: column;
                    gap: 0.5rem;
                    background-color: ${bg};
                }
                input.title-input {
                    background: transparent;
                    border: none;
                    color: ${fg};
                    font-size: 1.125rem;
                    font-weight: 700;
                    width: 100%;
                    outline: none;
                    text-transform: uppercase;
                }
                input.tag-input {
                    background: transparent;
                    border: none;
                    color: ${tagColor};
                    font-size: 0.75rem;
                    font-weight: 600;
                    width: 100%;
                    outline: none;
                    text-transform: uppercase;
                    letter-spacing: 0.05em;
                }
                textarea {
                    flex: 1;
                    width: 100%;
                    padding: 1rem;
                    background: transparent;
                    border: none;
                    color: ${fg};
                    font-size: 1rem;
                    line-height: 1.6;
                    resize: none;
                    outline: none;
                    font-family: inherit;
                    box-sizing: border-box;
                }
                .footer {
                    padding: 0.75rem 1rem;
                    border-top: 1px solid ${border};
                    display: flex;
                    justify-content: flex-end;
                    background-color: ${bg};
                }
                button {
                    background-color: #2563eb;
                    color: white;
                    border: none;
                    padding: 0.5rem 1rem;
                    border-radius: 0.5rem;
                    font-weight: 500;
                    cursor: pointer;
                    font-family: inherit;
                    transition: background-color 0.2s;
                }
                button:hover {
                    background-color: #1d4ed8;
                }
                ::-webkit-scrollbar { width: 8px; }
                ::-webkit-scrollbar-track { background: transparent; }
                ::-webkit-scrollbar-thumb { background: ${isDark ? '#475569' : '#cbd5e1'}; border-radius: 999px; }

                /* Toast */
                .toast {
                    position: fixed;
                    bottom: 20px;
                    left: 50%;
                    transform: translateX(-50%) translateY(100px);
                    background-color: ${isDark ? '#f8fafc' : '#0f172a'}; /* Inverse of bg */
                    color: ${isDark ? '#0f172a' : '#f8fafc'};
                    padding: 10px 20px;
                    border-radius: 12px;
                    opacity: 0;
                    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                    font-size: 0.875rem;
                    font-weight: 500;
                    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
                    z-index: 50;
                    display: flex;
                    align-items: center;
                    gap: 8px;
                    pointer-events: none;
                }
                .toast.show {
                    transform: translateX(-50%) translateY(0);
                    opacity: 1;
                }
            `;
            w.document.head.appendChild(style);

            // Container
            const container = w.document.createElement('form');
            container.style.height = '100%';
            container.style.display = 'flex';
            container.style.flexDirection = 'column';

            container.onsubmit = (e) => {
                e.preventDefault();
                save();
            };

            // Header
            const header = w.document.createElement('div');
            header.className = 'header';

            const inputTitle = w.document.createElement('input');
            inputTitle.className = 'title-input';
            inputTitle.value = title;
            inputTitle.placeholder = "JUDUL";
            header.appendChild(inputTitle);

            const inputTag = w.document.createElement('input');
            inputTag.className = 'tag-input';
            inputTag.value = tag;
            inputTag.placeholder = "TAG";
            header.appendChild(inputTag);

            container.appendChild(header);

            // Body
            const textarea = w.document.createElement('textarea');
            textarea.value = text;
            textarea.placeholder = "Tulis sesuatu...";
            container.appendChild(textarea);

            // Footer
            const footer = w.document.createElement('div');
            footer.className = 'footer';

            const btnSave = w.document.createElement('button');
            btnSave.textContent = "Simpan";
            btnSave.type = "submit";
            footer.appendChild(btnSave);

            container.appendChild(footer);
            w.document.body.appendChild(container);

            // Toast Element
            const toast = w.document.createElement('div');
            toast.className = 'toast';
            w.document.body.appendChild(toast);

            // Toast Logic
            const showToast = (msg, isError = false) => {
                toast.textContent = msg;
                toast.style.backgroundColor = isError ? '#ef4444' : (isDark ? '#f8fafc' : '#0f172a');
                toast.style.color = isError ? 'white' : (isDark ? '#0f172a' : '#f8fafc');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            };

            // Logic
            const save = async () => {
                const newTitle = inputTitle.value.trim();
                const newText = textarea.value;
                const newTag = inputTag.value.trim();

                // Show loading state on button
                const originText = btnSave.textContent;
                btnSave.textContent = "Menyimpan...";
                btnSave.disabled = true;

                try {
                    // Call parent update
                    await updateNoteContent(id, newTitle, newText, newTag);
                    showToast("Berhasil disimpan!");
                } catch (e) {
                    console.error(e);
                    showToast("Gagal: " + e.message, true);
                } finally {
                    btnSave.textContent = originText;
                    btnSave.disabled = false;
                }
            };

            w.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    save();
                }
            });
        }

        function togglePin(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                note.pinned = !note.pinned;
                saveNotes();
            }
        }

        // ============ Auth Modal ============
        function openAuthModal() {
            els.authModal.classList.remove("hidden");
            els.authModal.classList.add("flex");
            setTimeout(() => {
                els.authModalContent.classList.remove("scale-95", "opacity-0");
                els.authModalContent.classList.add("scale-100", "opacity-100");
            }, 10);
        }

        function closeAuthModal() {
            els.authModalContent.classList.remove("scale-100", "opacity-100");
            els.authModalContent.classList.add("scale-95", "opacity-0");
            setTimeout(() => {
                els.authModal.classList.add("hidden");
                els.authModal.classList.remove("flex");
                // Clear forms
                els.loginEmail.value = "";
                els.loginPassword.value = "";
                els.registerName.value = "";
                els.registerEmail.value = "";
                els.registerPassword.value = "";
                els.loginError.classList.add("hidden");
                els.registerError.classList.add("hidden");
            }, 200);
        }

        function switchToLogin() {
            // Update tab styles
            els.tabLogin.classList.add("text-blue-600", "dark:text-blue-400", "border-b-2", "border-blue-600", "dark:border-blue-400");
            els.tabLogin.classList.remove("text-slate-500", "dark:text-slate-400");
            els.tabRegister.classList.remove("text-blue-600", "dark:text-blue-400", "border-b-2", "border-blue-600", "dark:border-blue-400");
            els.tabRegister.classList.add("text-slate-500", "dark:text-slate-400");

            // Show/hide forms
            els.loginForm.classList.remove("hidden");
            els.registerForm.classList.add("hidden");
        }

        function switchToRegister() {
            // Update tab styles
            els.tabRegister.classList.add("text-blue-600", "dark:text-blue-400", "border-b-2", "border-blue-600", "dark:border-blue-400");
            els.tabRegister.classList.remove("text-slate-500", "dark:text-slate-400");
            els.tabLogin.classList.remove("text-blue-600", "dark:text-blue-400", "border-b-2", "border-blue-600", "dark:border-blue-400");
            els.tabLogin.classList.add("text-slate-500", "dark:text-slate-400");

            // Show/hide forms
            els.registerForm.classList.remove("hidden");
            els.loginForm.classList.add("hidden");
        }

        // Auth UI Update
        window.updateAuthUI = function (user) {
            if (user) {
                // User is logged in
                const displayName = user.displayName || user.email.split('@')[0];
                els.profileText.textContent = displayName;

                // Update Dropdown Info
                if (els.dropdownName) els.dropdownName.textContent = displayName;
                if (els.dropdownEmail) els.dropdownEmail.textContent = user.email;

                // Update Sidebar
                if (els.sidebarProfileText) els.sidebarProfileText.textContent = displayName;
                if (els.btnSidebarLogout) els.btnSidebarLogout.classList.remove("hidden");

                // Update click handler for Profile Button to toggle dropdown instead of opening auth modal
                els.btnProfile.onclick = (e) => {
                    e.stopPropagation();
                    els.profileDropdown.classList.toggle("hidden");
                };

                // Sidebar Profile button also opens dropdown or goes to profile page? 
                // For now, let's make it just show info or maybe nothing specific
                els.btnSidebarProfile.onclick = () => {
                    // Optional: Could open a profile settings modal in future
                    // for now just toggle the header dropdown logic or do nothing special
                    // effectively it acts as a display
                };

            } else {
                // User is logged into Guest Mode
                els.profileText.textContent = "Login";

                // Update Dropdown Info
                if (els.dropdownName) els.dropdownName.textContent = "Guest";
                if (els.dropdownEmail) els.dropdownEmail.textContent = "Not logged in";

                // Update Sidebar
                if (els.sidebarProfileText) els.sidebarProfileText.textContent = "Login";
                if (els.btnSidebarLogout) els.btnSidebarLogout.classList.add("hidden");

                // Reset click handler to open auth modal
                els.btnProfile.onclick = openAuthModal;
                els.btnSidebarProfile.onclick = openAuthModal;

                // Hide dropdown if open
                els.profileDropdown.classList.add("hidden");
            }
            // Re-attach logout handlers to be safe (idempotent via onclick)
            if (els.btnSidebarLogout) els.btnSidebarLogout.onclick = handleLogout;
            if (els.btnHeaderLogout) els.btnHeaderLogout.onclick = handleLogout;
        };

        function getFiltered() {
            let filtered = [...notes];
            const q = els.searchInput.value.toLowerCase();

            // Search
            if (q) {
                filtered = filtered.filter(n =>
                    n.text.toLowerCase().includes(q) ||
                    (n.title || "").toLowerCase().includes(q) ||
                    (n.tag || "").toLowerCase().includes(q)
                );
            }

            // Filter Type
            if (currentFilter === 'pinned') {
                filtered = filtered.filter(n => n.pinned && !n.isDraft);
            } else if (currentFilter === 'drafts') {
                filtered = filtered.filter(n => n.isDraft);
            } else if (currentFilter === 'all') {
                filtered = filtered.filter(n => !n.isDraft);
            } else if (currentFilter.startsWith('tag:')) {
                const tag = currentFilter.split(':')[1];
                filtered = filtered.filter(n => n.tag === tag && !n.isDraft);
            }

            // Sort: Pinned first, then Newest
            return filtered.sort((a, b) => {
                if (a.pinned !== b.pinned) return b.pinned - a.pinned;
                return b.createdAt - a.createdAt;
            });
        }

        // ============ Search Dropdown ============
        function getSnippet(text, query, radius = 60) {
            const lower = text.toLowerCase();
            const idx = lower.indexOf(query.toLowerCase());
            if (idx === -1) return null;
            const start = Math.max(0, idx - radius);
            const end = Math.min(text.length, idx + query.length + radius);
            let snippet = (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
            // Highlight the match
            const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            snippet = snippet.replace(re, '<mark class="bg-yellow-200 dark:bg-yellow-700/60 text-slate-900 dark:text-slate-100 rounded px-0.5">$1</mark>');
            return snippet;
        }

        function renderSearchDropdown() {
            const q = els.searchInput.value.trim();
            if (!q || q.length < 1) {
                els.searchDropdown.classList.add('hidden');
                return;
            }

            const ql = q.toLowerCase();
            const results = [];

            for (const n of notes) {
                const matchTitle = (n.title || '').toLowerCase().includes(ql);
                const matchText = (n.text || '').toLowerCase().includes(ql);
                const matchTag = (n.tag || '').toLowerCase().includes(ql);

                if (!matchTitle && !matchText && !matchTag) continue;

                const matches = [];
                if (matchTitle) matches.push({ where: 'Judul', snippet: getSnippet(n.title || '', q), color: 'blue' });
                if (matchTag) matches.push({ where: 'Tag', snippet: getSnippet(n.tag || '', q), color: 'purple' });
                if (matchText) matches.push({ where: 'Isi', snippet: getSnippet(n.text || '', q), color: 'green' });

                results.push({ note: n, matches });
            }

            if (results.length === 0) {
                els.searchDropdownList.innerHTML = `
                    <div class="px-4 py-6 text-center text-sm text-slate-400 dark:text-slate-500">
                        Tidak ada catatan yang cocok
                    </div>`;
                els.searchDropdown.classList.remove('hidden');
                return;
            }

            const colorMap = {
                blue: 'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300',
                purple: 'bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-300',
                green: 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300',
            };

            els.searchDropdownList.innerHTML = results.map(({ note: n, matches }) => {
                const title = escapeHtml(n.title || 'Tanpa Judul');
                const matchesHtml = matches.map(m => `
                    <div class="mt-1.5">
                        <span class="inline-block text-[10px] font-semibold px-1.5 py-0.5 rounded ${colorMap[m.color]} mr-1.5 uppercase tracking-wide">${m.where}</span>
                        <span class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">${m.snippet}</span>
                    </div>`).join('');

                return `
                    <div onclick="closeSearchDropdown(); openView('${n.id}')"
                        class="px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-800/60 cursor-pointer transition-colors border-b border-slate-100 dark:border-slate-800 last:border-0">
                        <div class="font-semibold text-sm text-slate-800 dark:text-slate-100 truncate">${title}</div>
                        ${matchesHtml}
                    </div>`;
            }).join('');

            els.searchDropdown.classList.remove('hidden');
        }

            lastSearchQuery = els.searchInput.value.trim();
            els.searchDropdown.classList.add('hidden');

        // ============ Initialization ============
        // Debounce: avoids running expensive functions on every keystroke
        function debounce(fn, delay) {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), delay);
            };
        }

            els.btnCancelRegister.addEventListener("click", closeAuthModal);
            els.btnLoginSubmit.addEventListener("click", handleLogin);
            els.btnRegisterSubmit.addEventListener("click", handleRegister);

            // Logout Modal Events
            if (els.btnSidebarLogout) els.btnSidebarLogout.addEventListener("click", handleLogout);
            if (els.btnHeaderLogout) els.btnHeaderLogout.addEventListener("click", handleLogout);

            els.btnCancelLogout.addEventListener("click", closeLogoutModal);
            els.btnConfirmLogout.addEventListener("click", confirmLogout);
            els.logoutModal.addEventListener("click", (e) => {
                if (e.target === els.logoutModal || e.target.id === "logoutModalBackdrop") {
                    closeLogoutModal();
                }
            });

            document.addEventListener("keydown", (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
                    addNote();
                    // Blur input to hide mobile keyboard
                    els.noteText.blur();
                    if (els.noteTitle) els.noteTitle.blur();
                }
                if (e.key === "Escape") {
                    closeEdit();
                    closeAddModal();
                    if (closeView) closeView();
                }
            });

            // Auto resize textarea
            els.noteText.addEventListener('input', function () {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            try {
                initTheme();
                loadNotes();
                setupEvents();
                render();
            } catch (e) {
                alert("Error: " + e.message);
                console.error(e);
            }
        });

    </script>

        // Load all notes for current user
        window.loadNotesFromFirestore = async function () {
            try {
                const q = query(collection(db, "notes"), where("userId", "==", currentUserId));
                const snapshot = await getDocs(q);
                return snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
            } catch (error) {
                console.error("Error loading notes:", error);
                return [];
            }
        };

        // Save note to Firestore (create or update)
        window.saveNoteToFirestore = async function (note) {
            try {
                const noteData = {
                    userId: currentUserId,
                    title: note.title || "",
                    text: note.text || "",
                    tag: note.tag || "",
                    pinned: note.pinned || false,
                    isDraft: note.isDraft || false,
                    createdAt: note.createdAt || Date.now(),
                    updatedAt: Date.now()
                };

                if (note.id) {
                    // Update existing
                    await updateDoc(doc(db, "notes", note.id), noteData);
                    return note.id;
                } else {
                    // Create new
                    const docRef = await addDoc(collection(db, "notes"), noteData);
                    return docRef.id;
                }
            } catch (error) {
                console.error("Error saving note:", error);
                throw error;
            }
        };

        // Delete note from Firestore
        window.deleteNoteFromFirestore = async function (noteId) {
            try {
                await deleteDoc(doc(db, "notes", noteId));
            } catch (error) {
                console.error("Error deleting note:", error);
                throw error;
            }
        };

        window.clearAllNotesFromFirestore = async function () {
            try {
                const q = query(collection(db, "notes"), where("userId", "==", currentUserId));
                const snapshot = await getDocs(q);

                const batch = writeBatch(db);
                snapshot.docs.forEach(doc => {
                    batch.delete(doc.ref);
                });

                await batch.commit();
            } catch (error) {
                console.error("Error clearing all notes:", error);
                throw error;
            }
        };

        // One-time migration from localStorage to Firestore
        window.migrateLocalToFirebase = async function () {
            try {
                const STORAGE_KEY = "modern_notes_v2";
                const raw = localStorage.getItem(STORAGE_KEY);

                if (!raw) {
                    console.log("No localStorage data to migrate");
                    return 0;
                }

                const oldNotes = JSON.parse(raw);
                let count = 0;

                for (const note of oldNotes) {
                    const noteData = {
                        userId: currentUserId,
                        title: note.title || "",
                        text: note.text || "",
                        tag: note.tag || "",
                        pinned: note.pinned || false,
                        isDraft: note.isDraft || false,
                        createdAt: note.createdAt || Date.now(),
                        updatedAt: note.updatedAt || Date.now()
                    };

                    await addDoc(collection(db, "notes"), noteData);
                    count++;
                }

                // Clear localStorage after successful migration
                localStorage.removeItem(STORAGE_KEY);
                console.log(`Migration complete: ${count} notes migrated to Firestore`);
                return count;
            } catch (error) {
                console.error("Error during migration:", error);
                throw error;
            }
        };

        // Migrate guest Firestore notes to logged-in user account
        window.migrateGuestNotesToAccount = async function () {
            if (!currentUserId || currentUserId === "default_user") return 0;
            try {
                const guestQ = query(collection(db, "notes"), where("userId", "==", "default_user"));
                const guestSnap = await getDocs(guestQ);
                if (guestSnap.empty) return 0;

                let count = 0;
                for (const guestDoc of guestSnap.docs) {
                    await updateDoc(doc(db, "notes", guestDoc.id), { userId: currentUserId });
                    count++;
                }
                console.log(`Migrated ${count} guest notes to account`);
                if (count > 0) showToast(`${count} catatan guest berhasil disimpan ke akun`);
                return count;
            } catch (error) {
                console.error("Guest migration error:", error);
                return 0;
            }
        };

        // ========== Firebase Auth Functions ==========

        // Register new user
        window.registerUser = async function (name, email, password) {
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                // Update profile with display name
                await updateProfile(userCredential.user, {
                    displayName: name
                });
                return { success: true, user: userCredential.user };
            } catch (error) {
                console.error("Registration error:", error);
                return { success: false, error: error.message };
            }
        };

        // Login existing user
        window.loginUser = async function (email, password) {
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                return { success: true, user: userCredential.user };
            } catch (error) {
                console.error("Login error:", error);
                return { success: false, error: error.message };
            }
        };

        // Logout current user
        window.logoutUser = async function () {
            try {
                await signOut(auth);
                return { success: true };
            } catch (error) {
                console.error("Logout error:", error);
                return { success: false, error: error.message };
            }
        };

        // Auth state listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // User is signed in
                currentUserId = user.uid;
                console.log("User authenticated:", user.email);

                // Update UI
                if (window.updateAuthUI) {
                    window.updateAuthUI(user);
                }
            } else {
                // User is signed out
                currentUserId = "default_user";
                console.log("User not authenticated, using guest mode");

                // Clear notes AND tags so account data doesn't show after logout
                notes = [];
                currentFilter = 'all';
                updateTags();
                render();

                // Update UI
                if (window.updateAuthUI) {
                    window.updateAuthUI(null);
                }
            }
        });

        // Expose currentUserId getter
        window.getCurrentUserId = () => currentUserId;

        console.log("Firebase initialized successfully");
    </script>
</body>

</html>
