        let swipeState = { element: null, inner: null, startX: 0, currentX: 0, taskId: null };
        window.lastSwipeDelta = 0; // for preventing click during swipe

        function attachSwipeListeners() {
            const containers = els.taskList.querySelectorAll('.task-swipe-container');
            containers.forEach(container => {
                const inner = container.querySelector('.task-card-inner');
                const bgLeft = container.querySelector('.bg-action-left');
                const bgRight = container.querySelector('.bg-action-right');

                container.addEventListener('touchstart', (e) => {
                    swipeState.element = container;
                    swipeState.inner = inner;
                    swipeState.startX = e.touches[0].clientX;
                    swipeState.currentX = swipeState.startX;
                    swipeState.taskId = container.dataset.taskId;
                    inner.style.transition = 'none';
                    window.lastSwipeDelta = 0;
                }, { passive: true });

                container.addEventListener('touchmove', (e) => {
                    if (!swipeState.element) return;
                    swipeState.currentX = e.touches[0].clientX;
                    const delta = swipeState.currentX - swipeState.startX;
                    window.lastSwipeDelta = delta;

                    // Cap it at 100px so we feel Resistance
                    let move = delta;
                    if (move > 100) move = 100 + (move - 100) * 0.2;
                    if (move < -100) move = -100 + (move + 100) * 0.2;

                    inner.style.transform = `translateX(${move}px)`;

                    if (delta > 30) {
                        bgLeft.style.opacity = '1';
                        bgRight.style.opacity = '0';
                    } else if (delta < -30) {
                        bgLeft.style.opacity = '0';
                        bgRight.style.opacity = '1';
                    } else {
                        bgLeft.style.opacity = '0';
                        bgRight.style.opacity = '0';
                    }
                }, { passive: true });

                container.addEventListener('touchend', () => {
                    if (!swipeState.element) return;
                    const delta = swipeState.currentX - swipeState.startX;

                    inner.style.transition = 'transform 0.2s ease-out';
                    inner.style.transform = `translateX(0px)`;

                    bgLeft.style.opacity = '0';
                    bgRight.style.opacity = '0';

                    if (delta > 80) {
                        // Swiped Right -> Complete toggle
                        toggleTask(swipeState.taskId);
                    } else if (delta < -80) {
                        // Swiped Left -> Delete
                        deleteTask(swipeState.taskId);
                    }

                    setTimeout(() => window.lastSwipeDelta = 0, 100);
                    swipeState.element = null;
                });
            });
        }

        // ============ Search Dropdown ============
        function getSnippet(text, query, radius = 60) {
            const lower = text.toLowerCase();
            const idx = lower.indexOf(query.toLowerCase());
            if (idx === -1) return null;
            const start = Math.max(0, idx - radius);
            const end = Math.min(text.length, idx + query.length + radius);
            let snippet =
                (start > 0 ? "…" : "") +
                text.slice(start, end) +
                (end < text.length ? "…" : "");
            // Highlight the match
            const re = new RegExp(
                `(${query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`,
                "gi",
            );
            snippet = snippet.replace(
                re,
                '<mark class="bg-yellow-200 dark:bg-yellow-700/60 text-slate-900 dark:text-slate-100 rounded px-0.5">$1</mark>',
            );
            return snippet;
        }

                const matchTag = (n.tag || "").toLowerCase().includes(ql);

                if (!matchTitle && !matchText && !matchTag) continue;

                const matches = [];
                if (matchTitle)
                    matches.push({
                        where: "Judul",
                        snippet: getSnippet(n.title || "", q),
                        color: "blue",

                if (matchTag)
                    matches.push({
                        where: "Tag",
                        snippet: getSnippet(n.tag || "", q),
                        color: "purple",
                    });
                if (matchText)
                    matches.push({
                        where: "Isi",
                        snippet: getSnippet(n.text || "", q),
                        color: "green",
                    });

                results.push({ note: n, matches });

            };

                    pinned: note.pinned || false,

                        updatedAt: note.updatedAt || Date.now(),
                    };

                    await addDoc(collection(db, "notes"), noteData);
                    count++;
                }

                // Clear localStorage after successful migration
                localStorage.removeItem(STORAGE_KEY);
                console.log(
                    `Migration complete: ${count} notes migrated to Firestore`,
                );
                return count;
            } catch (error) {
                console.error("Error during migration:", error);
                throw error;
            }
        };

        // Migrate guest Firestore notes to logged-in user account
        window.migrateGuestNotesToAccount = async function () {
            if (!currentUserId || currentUserId === "default_user") return 0;
            try {
                const guestQ = query(
                    collection(db, "notes"),
                    where("userId", "==", "default_user"),
                );

                let guestSnap;
                try {
                    guestSnap = await getDocs(guestQ);
                } catch (e) {
                    console.warn("Could not read guest notes (likely permissions):", e);
                    return 0; // Skip migration peacefully if rules deny it
                }

                if (guestSnap.empty) return 0;

                let count = 0;
                for (const guestDoc of guestSnap.docs) {
                    await updateDoc(doc(db, "notes", guestDoc.id), {
                        userId: currentUserId,
                    });
                    count++;
                }
                console.log(`Migrated ${count} guest notes to account`);
                if (count > 0)
                    showToast(`${count} catatan guest berhasil disimpan ke akun`);
                return count;
            } catch (error) {
                console.error("Guest migration error:", error);
                return 0;
            }
        };

        // ========== Firebase Auth Functions ==========

        // Register new user
        window.registerUser = async function (name, email, password) {
            try {
                const userCredential = await createUserWithEmailAndPassword(
                    auth,
                    email,
                    password,
                );
                // Update profile with display name
                await updateProfile(userCredential.user, {
                    displayName: name,
                });
                return { success: true, user: userCredential.user };
            } catch (error) {
                console.error("Registration error:", error);
                return { success: false, error: error.message };
            }
        };

        // Login existing user
        window.loginUser = async function (email, password) {
            try {
                const userCredential = await signInWithEmailAndPassword(
                    auth,
                    email,
                    password,
                );
                return { success: true, user: userCredential.user };
            } catch (error) {
                console.error("Login error:", error);
                return { success: false, error: error.message };
            }
        };

        // Logout current user
        window.logoutUser = async function () {
            try {
                await signOut(auth);
                return { success: true };
            } catch (error) {
                console.error("Logout error:", error);
                return { success: false, error: error.message };
            }
        };

        // Auth state listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // User is signed in
                currentUserId = user.uid;
                console.log("User authenticated:", user.email);

                // Update UI
                if (window.updateAuthUI) {
                    window.updateAuthUI(user);
                }

                // Load user's notes and tasks
                await loadNotes();
                tasks = await window.loadTasksFromFirestore();
                saveTasks(); // updates local state and re-renders
            } else {
                // User is signed out
                currentUserId = "default_user";
                console.log("User not authenticated, using guest mode");

                // Clear notes AND tags so account data doesn't show after logout
                notes = [];
                tasks = [];
                currentFilter = "all";
                updateTags();
                render();

                // Update UI
                if (window.updateAuthUI) {
                    window.updateAuthUI(null);
                }
            }
        });

        // Expose currentUserId getter
        window.getCurrentUserId = () => currentUserId;

        console.log("Firebase initialized successfully");

        // ============ Background Reminder Check ============
        setInterval(() => {
            if (!tasks || tasks.length === 0) return;
            const now = Date.now();

            tasks.forEach((t) => {
                if (
                    !t.completed &&
                    t.reminder &&
                    t.reminder <= now &&
                    !t.reminderShown
                ) {
                    showToast(`REMINDER: ${t.title}`);
                    t.reminderShown = true;
                    // Auto-hide reminder logic (local only to not spam DB ideally, but optional)
                    // If we synced it, we would update Firestore here:
                    if (window.saveTaskToFirestore) {
                        window.saveTaskToFirestore(t);
                    }
                }
            });
        }, 10000); // Check every 10 seconds
    </script>
</body>
