<!doctype html>
<html lang="id" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nonoted</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22white%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><circle cx=%2212%22 cy=%2212%22 r=%2212%22 fill=%22%232563eb%22 stroke=%22none%22/><g transform=%22translate(4,4) scale(0.66)%22><path d=%22M13.4 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7.4%22/><path d=%22M2 6h4%22/><path d=%22M16 2v4%22/><path d=%22m21.2 8.8-9 9a2 1.5 2 1.5 0 0 0 0 3l-1 1-1-1a2.1.5 2.1.5 0 0 0 0-3l9-9a2 2 0 0 1 2.8 2.8Z%22/></g></svg>"
    />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide (Outline icons) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Flowbite -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/datepicker.min.js"></script>

    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(156, 163, 175, 0.3);
        border-radius: 999px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: rgba(156, 163, 175, 0.5);
      }

      .fade-in {
        animation: fadeIn 0.2s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Hide scrollbar for sidebar on mobile if needed */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* GPU compositing for smooth modal animations */
      #addModal,
      #editModal,
      #viewModal,
      #authModal,
      #logoutModal {
        will-change: opacity;
      }

      #addModalContent,
      #modalContent,
      #viewModalContent,
      #authModalContent,
      #logoutModalContent {
        will-change: transform, opacity;
      }

      /* Limit reflow scope to the notes grid */
      #notesGrid {
        contain: layout style;
      }
    </style>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
            },
          },
        },
      };
    </script>
  </head>

  <body
    class="bg-white text-slate-800 dark:bg-slate-950 dark:text-slate-200 transition-colors duration-300 antialiased selection:bg-blue-500/30 selection:text-blue-600 dark:selection:text-blue-300"
  >
    <div class="flex h-screen w-full overflow-hidden">
      <!-- Sidebar -->
      <aside
        id="sidebar"
        class="w-64 flex-col border-r border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50 hidden md:flex fixed md:relative inset-y-0 left-0 z-50 h-full"
      >
        <div
          class="h-16 flex items-center px-6 border-b border-slate-200 dark:border-slate-800"
        >
          <div class="flex items-center gap-2 font-bold text-lg tracking-tight">
            <div
              class="h-8 w-8 rounded-lg bg-blue-600 flex items-center justify-center text-white"
            >
              <i data-lucide="notebook-pen" class="h-4 w-4"></i>
            </div>
            <span>Nonoted</span>
          </div>
          <!-- Close Sidebar (Mobile) -->
          <button
            id="btnCloseSidebar"
            class="md:hidden ml-auto p-2 text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg"
          >
            <i data-lucide="x" class="h-5 w-5"></i>
          </button>
        </div>

        <div
          class="flex-1 overflow-y-auto p-4 space-y-6 bg-white dark:bg-slate-950/50 md:bg-transparent"
        >
          <!-- Main Nav -->
          <nav class="space-y-1">
            <button
              onclick="filterNotes('all')"
              id="nav-all"
              class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300 transition-colors"
            >
              <i data-lucide="layers" class="h-4 w-4"></i>
              Semua Catatan
            </button>
            <button
              onclick="filterNotes('pinned')"
              id="nav-pinned"
              class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
            >
              <i data-lucide="pin" class="h-4 w-4"></i>
              Pinned
            </button>
            <button
              onclick="filterNotes('drafts')"
              id="nav-drafts"
              class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
            >
              <i data-lucide="clipboard-pen" class="h-4 w-4"></i>
              Drafts
            </button>
            <button
              onclick="filterNotes('tasks')"
              id="nav-tasks"
              class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors mt-4"
            >
              <i data-lucide="calendar-check" class="h-4 w-4"></i>
              Tasks
            </button>
          </nav>

          <!-- Tags -->
          <div>
            <div
              class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 px-3"
            >
              Tags
            </div>
            <nav id="tagsList" class="space-y-1">
              <!-- Dynamic tags will go here -->
            </nav>
          </div>
        </div>

        <div
          class="p-4 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950/50 md:bg-transparent space-y-1"
        >
          <button
            id="btnSidebarProfile"
            onclick="openAuthModal()"
            class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
          >
            <i data-lucide="user" class="h-4 w-4"></i>
            <span id="sidebarProfileText">Profile</span>
          </button>
          <button
            id="btnSidebarLogout"
            class="hidden w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-900/20 transition-colors"
          >
            <i data-lucide="log-out" class="h-4 w-4"></i>
            Log Out
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 flex flex-col h-full relative">
        <!-- Header -->
        <header
          class="h-16 flex items-center justify-between px-4 sm:px-8 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-sm z-10"
        >
          <div class="flex items-center gap-4 flex-1">
            <button
              id="btnMenu"
              class="md:hidden p-2 -ml-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg"
            >
              <i data-lucide="menu" class="h-5 w-5"></i>
            </button>
            <div class="relative w-full max-w-md">
              <i
                data-lucide="search"
                class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400 z-10"
              ></i>
              <input
                id="searchInput"
                type="text"
                placeholder="Cari catatan..."
                class="w-full pl-9 pr-4 py-2 bg-slate-100 dark:bg-slate-900 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500/50 outline-none transition-all placeholder:text-slate-500 text-slate-700 dark:text-slate-200"
                autocomplete="off"
              />
              <!-- Search Results Dropdown -->
              <div
                id="searchDropdown"
                class="hidden absolute top-full left-0 right-0 mt-2 bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800 z-[200] max-h-[420px] overflow-y-auto"
              >
                <div id="searchDropdownList" class="py-2"></div>
              </div>
            </div>
          </div>

          <div class="flex items-center gap-3 ml-4">
            <div
              class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-900 text-xs font-medium text-slate-500"
            >
              <span id="countNotes">0</span> Catatan
            </div>
            <button
              id="themeToggle"
              class="p-2 rounded-xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
              title="Toggle Theme"
            >
              <i data-lucide="moon" class="h-5 w-5 hidden dark:block"></i>
              <i data-lucide="sun" class="h-5 w-5 block dark:hidden"></i>
            </button>
            <button
              id="btnExport"
              class="p-2 rounded-xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
              title="Export"
            >
              <i data-lucide="download" class="h-5 w-5"></i>
            </button>
            <div class="relative">
              <button
                id="btnProfile"
                class="flex items-center gap-2 px-3 py-2 rounded-xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                title="Profile"
              >
                <i data-lucide="user-circle" class="h-5 w-5"></i>
                <span
                  class="hidden sm:inline text-sm font-medium"
                  id="profileText"
                  >Login</span
                >
                <i
                  data-lucide="chevron-down"
                  class="h-4 w-4 ml-1 hidden sm:block"
                ></i>
              </button>

              <!-- Profile Dropdown -->
              <div
                id="profileDropdown"
                class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-slate-900 rounded-xl shadow-lg border border-slate-200 dark:border-slate-800 py-1 z-50 transform origin-top-right transition-all duration-200"
              >
                <div
                  class="px-4 py-3 border-b border-slate-100 dark:border-slate-800"
                >
                  <p
                    class="text-sm font-medium text-slate-900 dark:text-slate-100 truncate"
                    id="dropdownName"
                  >
                    Guest
                  </p>
                  <p
                    class="text-xs text-slate-500 dark:text-slate-400 truncate"
                    id="dropdownEmail"
                  >
                    Not logged in
                  </p>
                </div>
                <button
                  id="btnHeaderLogout"
                  class="w-full text-left px-4 py-2 text-sm text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-900/20 transition-colors flex items-center gap-2"
                >
                  <i data-lucide="log-out" class="h-4 w-4"></i>
                  Log Out
                </button>
              </div>
            </div>
          </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto p-4 sm:p-8 scroll-smooth">
          <!-- Grid -->
          <div
            id="notesGrid"
            class="max-w-6xl mx-auto grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 pb-20 transition-all duration-300"
          >
            <!-- Cards go here -->
          </div>

          <!-- Task List View -->
          <div
            id="tasksView"
            class="hidden max-w-3xl mx-auto pb-20 space-y-6 transition-all duration-300"
          >
            <!-- Task Header -->
            <div class="flex items-center justify-between">
              <h2 class="text-2xl font-bold text-slate-800 dark:text-slate-100">
                Tasks
              </h2>
              <button
                onclick="openAddTaskModal()"
                class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-colors shadow-sm"
              >
                <i data-lucide="plus" class="h-4 w-4"></i>
                Add Task
              </button>
            </div>

            <!-- Progress Bar -->
            <div
              class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-4 border border-slate-200 dark:border-slate-700"
            >
              <div class="flex justify-between items-center mb-2">
                <span
                  class="text-sm font-medium text-slate-600 dark:text-slate-400"
                  >Progress</span
                >
                <span
                  id="taskProgressText"
                  class="text-sm font-bold text-slate-800 dark:text-slate-200"
                  >0 / 0 completed</span
                >
              </div>
              <div
                class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2.5 overflow-hidden"
              >
                <div
                  id="taskProgressBar"
                  class="bg-blue-600 h-2.5 rounded-full transition-all duration-500 ease-out"
                  style="width: 0%"
                ></div>
              </div>
            </div>

            <!-- Filter Tabs -->
            <div
              class="flex space-x-2 border-b border-slate-200 dark:border-slate-800 pb-2 overflow-x-auto no-scrollbar"
            >
              <button
                onclick="setTaskFilter('all')"
                id="task-filter-all"
                class="px-4 py-2 text-sm font-medium border-b-2 transition-colors whitespace-nowrap border-blue-600 text-blue-600 dark:text-blue-400"
              >
                All
              </button>
              <button
                onclick="setTaskFilter('today')"
                id="task-filter-today"
                class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-colors whitespace-nowrap"
              >
                Today
              </button>
              <button
                onclick="setTaskFilter('upcoming')"
                id="task-filter-upcoming"
                class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-colors whitespace-nowrap"
              >
                Upcoming
              </button>
              <button
                onclick="setTaskFilter('completed')"
                id="task-filter-completed"
                class="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-colors whitespace-nowrap"
              >
                Completed
              </button>
            </div>

            <!-- Task List Container -->
            <div id="taskList" class="space-y-3">
              <!-- Task cards will be rendered here -->
            </div>
          </div>

          <!-- Empty State -->
          <div
            id="emptyState"
            class="hidden flex flex-col items-center justify-center py-20 text-slate-400"
          >
            <div
              class="h-20 w-20 rounded-2xl bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex items-center justify-center mb-4"
            >
              <i
                data-lucide="inbox"
                class="h-8 w-8 text-slate-300 dark:text-slate-600"
              ></i>
            </div>
            <p class="text-sm">Belum ada catatan.</p>
          </div>
        </div>
      </main>
    </div>

    <!-- Floating Action Button -->
    <button
      id="btnOpenAdd"
      class="fixed bottom-8 right-8 h-14 w-14 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-lg hover:shadow-blue-500/30 transition-all flex items-center justify-center group z-40"
    >
      <i
        data-lucide="plus"
        class="h-6 w-6 group-hover:rotate-90 transition-transform duration-300"
      ></i>
    </button>

    <!-- Add Modal -->
    <div
      id="addModal"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-black/20 backdrop-blur-sm p-4"
    >
      <div
        id="addModalContent"
        class="w-full max-w-2xl bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 p-6 transform scale-95 opacity-0 transition-all duration-200"
      >
        <h3 class="text-xl font-bold mb-4 text-slate-800 dark:text-slate-100">
          Catatan Baru
        </h3>

        <div class="space-y-4">
          <input
            id="noteTitle"
            type="text"
            placeholder="Judul"
            oninput="this.value = this.value.toUpperCase()"
            class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors font-bold text-lg text-slate-800 dark:text-slate-100 uppercase"
          />
          <input
            id="noteTag"
            type="text"
            placeholder="Tag"
            class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors text-sm font-semibold uppercase tracking-wide text-slate-500"
          />
          <textarea
            id="noteText"
            rows="6"
            placeholder="Tulis sesuatu..."
            class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors resize-none text-slate-700 dark:text-slate-200"
          ></textarea>

          <div class="flex gap-4 items-center">
            <label
              class="flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 cursor-pointer select-none hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors"
            >
              <input
                id="pinNew"
                type="checkbox"
                class="accent-blue-600 h-4 w-4"
              />
              <span
                class="text-sm font-medium text-slate-600 dark:text-slate-400"
                >Pin</span
              >
            </label>
            <div class="flex-1"></div>
            <button
              id="btnCloseAdd"
              class="px-4 py-2 text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 font-medium transition-colors"
            >
              Batal
            </button>
            <button
              id="btnAdd"
              class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-colors"
            >
              Simpan
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- View Modal (Read Only) -->
    <div
      id="viewModal"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-black/20 backdrop-blur-sm p-4"
    >
      <div
        id="viewModalContent"
        class="w-full max-w-2xl bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 p-6 transform scale-95 opacity-0 transition-all duration-200 max-h-[90vh] flex flex-col"
      >
        <div class="flex items-start justify-between mb-4">
          <h3
            id="viewTitle"
            class="text-2xl font-bold text-slate-800 dark:text-slate-100 break-words flex-1 mr-4"
          ></h3>
          <button
            id="btnCloseView"
            class="p-2 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors"
          >
            <i data-lucide="x" class="h-5 w-5"></i>
          </button>
        </div>

        <div class="flex items-center gap-2 mb-4">
          <span
            id="viewTag"
            class="hidden px-2 py-1 rounded text-xs font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700 uppercase tracking-wide"
          ></span>
          <span id="viewDate" class="text-xs text-slate-400"></span>
        </div>

        <!-- In-Note Search -->
        <div class="relative mb-4 group">
          <input
            id="viewSearchInput"
            type="text"
            placeholder="Temukan di catatan ini..."
            class="w-full pl-9 pr-4 py-2 bg-slate-50 dark:bg-slate-800/50 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl border border-transparent focus:bg-white dark:focus:bg-slate-900 focus:border-blue-500 dark:focus:border-blue-500 transition-all text-sm outline-none placeholder:text-slate-400/70"
          />
          <i
            data-lucide="search"
            class="absolute left-3 top-2.5 h-4 w-4 text-slate-400 group-focus-within:text-blue-500 transition-colors"
          ></i>
        </div>

        <div
          id="viewText"
          class="text-slate-700 dark:text-slate-300 leading-relaxed text-base overflow-y-auto pr-2 whitespace-pre-wrap"
        ></div>

        <div
          class="flex justify-end gap-3 mt-8 pt-4 border-t border-slate-100 dark:border-slate-800"
        >
          <button
            id="btnViewEdit"
            class="flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 hover:bg-blue-50 dark:hover:bg-blue-900/20 text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 rounded-xl transition-colors font-medium text-sm"
          >
            <i data-lucide="pencil" class="h-4 w-4"></i>
            Edit
          </button>
        </div>
      </div>
    </div>

    <!-- Add Task Modal -->
    <div
      id="addTaskModal"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-black/20 backdrop-blur-sm p-4"
    >
      <div
        id="addTaskModalContent"
        class="w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 p-6 transform scale-95 opacity-0 transition-all duration-200"
      >
        <h3
          class="text-xl font-bold mb-4 text-slate-800 dark:text-slate-100 flex items-center gap-2"
        >
          <i data-lucide="check-square" class="h-6 w-6 text-blue-600"></i>
          Tugas Baru
        </h3>

        <div class="space-y-4">
          <input
            id="taskTitle"
            type="text"
            placeholder="Apa yang harus dilakukan?"
            class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 dark:focus:border-blue-500 transition-colors text-lg text-slate-800 dark:text-slate-100"
          />

          <div class="space-y-4">
            <div class="relative">
              <label
                class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide"
                >Tenggat Waktu</label
              >
              <button
                id="btnTaskDate"
                type="button"
                data-modal-target="timepicker-modal"
                data-modal-toggle="timepicker-modal"
                class="w-full inline-flex items-center justify-between text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors focus:ring-4 focus:ring-blue-500/20 font-medium rounded-xl text-sm px-4 py-3 focus:outline-none"
              >
                <div class="flex items-center gap-2">
                  <i data-lucide="calendar" class="h-4 w-4 text-slate-400"></i>

    <script>
      // ============ State ============
      const STORAGE_KEY = "modern_notes_v2";
      const TASKS_KEY = "modern_tasks_v1"; // Separate storage key for tasks logic (if local)
      const THEME_KEY = "theme_preference";
      let notes = [];
      let tasks = [];
      let currentFilter = "all";
      let currentMode = "notes"; // 'notes' or 'tasks'

      const $ = (id) => document.getElementById(id);
      const els = {
        noteTitle: $("noteTitle"),

        editModal: $("editModal"),
        modalContent: $("modalContent"),
        btnCloseModal: $("btnCloseModal"),

        editText: $("editText"),

        btnSaveEdit: $("btnSaveEdit"),
        tagsList: $("tagsList"),
        navAll: $("nav-all"),
        navPinned: $("nav-pinned"),
        navTasks: $("nav-tasks"),
        // Add Modal
        btnOpenAdd: $("btnOpenAdd"),
        addModal: $("addModal"),
        addModalContent: $("addModalContent"),
        btnCloseAdd: $("btnCloseAdd"),
        // Add Task Modal
        addTaskModal: $("addTaskModal"),
        addTaskModalContent: $("addTaskModalContent"),
        taskTitle: $("taskTitle"),
        btnTaskDate: $("btnTaskDate"),
        taskDateLabel: $("taskDateLabel"),
        btnTaskReminder: $("btnTaskReminder"),
        taskReminderLabel: $("taskReminderLabel"),
        btnSaveTimepicker: $("btnSaveTimepicker"),
        inlineDatepicker: $("inlineDatepicker"),
        btnSaveTask: $("btnSaveTask"),
        btnCloseAddTask: $("btnCloseAddTask"),
        taskProgressText: $("taskProgressText"),
        taskProgressBar: $("taskProgressBar"),
        taskList: $("taskList"),
        // View Modal
        viewModal: $("viewModal"),
        viewModalContent: $("viewModalContent"),
        btnCloseView: $("btnCloseView"),
        viewTitle: $("viewTitle"),
        viewText: $("viewText"),

        viewDate: $("viewDate"),
        viewSearchInput: $("viewSearchInput"),
        btnViewEdit: $("btnViewEdit"),
        // Nav
        navDrafts: $("nav-drafts"),
        // Auth
        btnProfile: $("btnProfile"),
        profileDropdown: $("profileDropdown"),
        dropdownName: $("dropdownName"),
        dropdownEmail: $("dropdownEmail"),
        btnSidebarProfile: $("btnSidebarProfile"),
        sidebarProfileText: $("sidebarProfileText"),
        btnSidebarLogout: $("btnSidebarLogout"),
        btnHeaderLogout: $("btnHeaderLogout"),

        authModal: $("authModal"),
        authModalContent: $("authModalContent"),
        tabLogin: $("tabLogin"),
        tabRegister: $("tabRegister"),
        loginForm: $("loginForm"),
        registerForm: $("registerForm"),
        loginEmail: $("loginEmail"),
        loginPassword: $("loginPassword"),
        loginError: $("loginError"),
        registerName: $("registerName"),
        registerEmail: $("registerEmail"),
        registerPassword: $("registerPassword"),
        registerError: $("registerError"),
        btnCancelAuth: $("btnCancelAuth"),
        btnCancelRegister: $("btnCancelRegister"),
        btnLoginSubmit: $("btnLoginSubmit"),
        btnRegisterSubmit: $("btnRegisterSubmit"),
        // Logout Modal
        logoutModal: $("logoutModal"),
        logoutModalContent: $("logoutModalContent"),
        btnCancelLogout: $("btnCancelLogout"),
        btnConfirmLogout: $("btnConfirmLogout"),
      };

      let editingId = null;

      // ============ Theme ============
      function initTheme() {
        const saved = localStorage.getItem(THEME_KEY);
        const updatedClass =
          saved === "dark" ||
          (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", updatedClass);
      }

      function toggleTheme() {
        const isDark = document.documentElement.classList.toggle("dark");
        localStorage.setItem(THEME_KEY, isDark ? "dark" : "light");
      }

      // ============ Helpers ============
      function uid() {
        return (
          crypto?.randomUUID?.() ||
          Date.now().toString(36) + Math.random().toString(36).substr(2)
        );
      }

      function showToast(msg) {
        els.toastText.textContent = msg;
        els.toast.classList.remove("translate-y-20", "opacity-0");
        setTimeout(() => {
          els.toast.classList.add("translate-y-20", "opacity-0");
        }, 2000);
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(
          /[&<>'"]/g,
          (tag) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              "'": "&#39;",
              '"': "&quot;",
            })[tag],
        );
      }

      function formatDate(ms) {
        return new Date(ms).toLocaleDateString("id-ID", {
          day: "numeric",
          month: "short",
        });
      }

      // ============ Core Logic ============
      async function loadNotes() {
        try {
          // Check for localStorage data and migrate if exists
          const STORAGE_KEY = "modern_notes_v2";
          const hasLocalData = localStorage.getItem(STORAGE_KEY);

          if (hasLocalData) {
            console.log("Found localStorage data, migrating to Firestore...");
            const migratedCount = await window.migrateLocalToFirebase();
            if (migratedCount > 0) {
              showToast(`Migrated ${migratedCount} notes to cloud storage`);
            }
          }

          // Migrate guest Firestore notes to logged-in user account
          if (window.migrateGuestNotesToAccount) {
            await window.migrateGuestNotesToAccount();
          }

          // Load from Firestore
          notes = await window.loadNotesFromFirestore();
          // Load tasks (mock for now if no firestore backend yet, or reuse similar structure)
          // For this implementation we'll use LocalStorage or extending Firestore if available.
          // Assuming we use a similar pattern or just local storage for simplicity in this turn
          // unless user specified database. User said "menu task aja", implying visual separation.
          // Let's use LocalStorage for tasks to ensure it works immediately without DB schema changes.
          const storedTasks = localStorage.getItem(TASKS_KEY);
          if (storedTasks) tasks = JSON.parse(storedTasks);

          updateTags();
          render();
        } catch (error) {
          console.error("Error loading notes:", error);
          notes = [];
          tasks = [];
          updateTags();
          render();
        }
      }

      // Helper to save and re-render
      async function saveNotes() {
        updateTags();
        render();
      }

      function saveTasks() {
        localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
        render();
      }

      // ============ Task Modal Logic ============
      // ============ Timepicker Logic ============
      let timepickerTarget = null;
      let taskDueDate = null;
      let taskReminderTime = null;

      // Listen to Flowbite Datepicker change event
      let selectedTaskDate = new Date();
      if (els.inlineDatepicker) {
        els.inlineDatepicker.addEventListener("changeDate", (e) => {
          if (e.detail && e.detail.date) {
            selectedTaskDate = new Date(e.detail.date);
          }
        });
      }

      if (els.btnTaskDate) {
        els.btnTaskDate.addEventListener("click", () => {
          timepickerTarget = "dueDate";
        });
      }
      if (els.btnTaskReminder) {
        els.btnTaskReminder.addEventListener("click", () => {
          timepickerTarget = "reminder";
        });
      }

      if (els.btnSaveTimepicker) {
        els.btnSaveTimepicker.addEventListener("click", () => {
          const timeInput = document.getElementById("timeInput");
          let timeStr = "12:00";
          if (timeInput && timeInput.value) {

      // ============ Task Notification Logic ============
      async function scheduleTaskNotification(task) {
        if (!task.dueDate) return;
        try {
          if (window.LocalNotifications) {
            const permStatus =
              await window.LocalNotifications.requestPermissions();
            if (permStatus.display === "granted") {
              if (task.dueDate > Date.now()) {
                const notifId = Math.abs(
                  task.id.split("").reduce((a, b) => {
                    a = (a << 5) - a + b.charCodeAt(0);
                    return a & a;
                  }, 0),
                );
                await window.LocalNotifications.schedule({
                  notifications: [
                    {
                      title: "Pengingat Tugas",
                      body: task.title,
                      id: notifId,
                      schedule: { at: new Date(task.dueDate) },
                      sound: null,
                      attachments: null,
                      actionTypeId: "",
                      extra: null,
                    },
                  ],
                });
                console.log("Task notification scheduled");
              }
            }
          }
        } catch (e) {
          console.error(e);
        }
      }

      async function cancelTaskNotification(taskId) {
        try {
          if (window.LocalNotifications) {
            const notifId = Math.abs(
              taskId.split("").reduce((a, b) => {
                a = (a << 5) - a + b.charCodeAt(0);
                return a & a;
              }, 0),
            );
            await window.LocalNotifications.cancel({
              notifications: [{ id: notifId }],
            });
          }
        } catch (e) {
          console.error(e);
        }
      }

          } else if (t.dueDate && t.dueDate > Date.now()) {
            // Reschedule if un-completed and still valid
            await scheduleTaskNotification(t);
          }
        }
      }

      function highlightText(text, query) {
        if (!query) return escapeHtml(text);
        const re = new RegExp(
          `(${query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`,
          "gi",
        );
        return escapeHtml(text).replace(
          re,
          '<mark class="bg-yellow-200 dark:bg-yellow-600/50 text-slate-900 dark:text-slate-100 rounded px-0.5">$1</mark>',
        );
      }

          els.logoutModalContent.style.transform = "scale(1)";
        }

        // Update icons since we re-rendered
        lucide.createIcons();

        setTimeout(() => {
          if (els.logoutModalContent) {
            els.logoutModalContent.classList.remove("scale-95", "opacity-0");
            els.logoutModalContent.classList.add("scale-100", "opacity-100");
            console.log("Modal content animated");
          }
        }, 10);
      }

      function closeLogoutModal() {
        els.logoutModalContent.classList.remove("scale-100", "opacity-100");
        els.logoutModalContent.classList.add("scale-95", "opacity-0");
        setTimeout(() => {
          els.logoutModal.classList.add("hidden");
          els.logoutModal.classList.remove("flex");
        }, 200);
      }

      async function confirmLogout() {
        const result = await window.logoutUser();
        if (result.success) {
          showToast("Berhasil keluar");
          closeLogoutModal();
          els.profileDropdown.classList.add("hidden");
        } else {
          showToast("Gagal logout: " + result.error, true); // Use true for error style if using main toast too?
          // Or just standard toast
        }
      }

      async function handleLogin() {
        const email = els.loginEmail.value.trim();
        const password = els.loginPassword.value;

        if (!email || !password) {
          els.loginError.textContent = "Email dan password harus diisi";
          els.loginError.classList.remove("hidden");
          return;
        }

        // Hide previous errors
        els.loginError.classList.add("hidden");

        // Disable button during login
        els.btnLoginSubmit.disabled = true;
        els.btnLoginSubmit.textContent = "Masuk...";

        const result = await window.loginUser(email, password);

        if (result.success) {
          showToast(`Selamat datang, ${result.user.email}!`);
          closeAuthModal();
          // Reload notes for the logged-in user
          await loadNotes();
        } else {
          // Show error message
          let errorMsg = "Login gagal";
          if (
            result.error.includes("invalid-credential") ||
            result.error.includes("user-not-found")
          ) {
            errorMsg = "Email atau password salah";
          } else if (result.error.includes("too-many-requests")) {
            errorMsg = "Terlalu banyak percobaan, coba lagi nanti";
          }
          els.loginError.textContent = errorMsg;
          els.loginError.classList.remove("hidden");
        }

        // Re-enable button
        els.btnLoginSubmit.disabled = false;
        els.btnLoginSubmit.textContent = "Masuk";
      }

      async function handleRegister() {
        const name = els.registerName.value.trim();
        const email = els.registerEmail.value.trim();
        const password = els.registerPassword.value;

        if (!name || !email || !password) {
          els.registerError.textContent = "Semua field harus diisi";
          els.registerError.classList.remove("hidden");
          return;
        }

        if (password.length < 6) {
          els.registerError.textContent = "Password minimal 6 karakter";
          els.registerError.classList.remove("hidden");
          return;
        }

        // Hide previous errors
        els.registerError.classList.add("hidden");

        // Disable button during registration
        els.btnRegisterSubmit.disabled = true;
        els.btnRegisterSubmit.textContent = "Mendaftar...";

        const result = await window.registerUser(name, email, password);

        if (result.success) {
          showToast(`Akun berhasil dibuat! Selamat datang, ${name}!`);
          closeAuthModal();
          // Reload notes + migrate guest notes to new account
          await loadNotes();
        } else {
          // Show error message
          let errorMsg = "Registrasi gagal";
          if (result.error.includes("email-already-in-use")) {
            errorMsg = "Email sudah terdaftar";
          } else if (result.error.includes("invalid-email")) {
            errorMsg = "Format email tidak valid";
          } else if (result.error.includes("weak-password")) {
            errorMsg = "Password terlalu lemah";
          }
          els.registerError.textContent = errorMsg;
          els.registerError.classList.remove("hidden");
        }

        // Re-enable button
        els.btnRegisterSubmit.disabled = false;
        els.btnRegisterSubmit.textContent = "Daftar";
      }

      // ============ Edit Modal ============
      function openEdit(id) {
        const n = notes.find((x) => x.id === id);
        if (!n) return;
        editingId = id;
        if (els.editTitle) els.editTitle.value = n.title || "";
        els.editText.value = n.text;
        els.editTag.value = n.tag || "";
        els.editPinned.checked = n.pinned;

        els.editModal.classList.remove("hidden");
        els.editModal.classList.add("flex");
        // Animasi masuk
        setTimeout(() => {
          els.modalContent.classList.remove("scale-95", "opacity-0");
          els.modalContent.classList.add("scale-100", "opacity-100");
        }, 10);
      }

      function closeEdit() {
        els.modalContent.classList.remove("scale-100", "opacity-100");
        els.modalContent.classList.add("scale-95", "opacity-0");
        setTimeout(() => {
          els.editModal.classList.add("hidden");
          els.editModal.classList.remove("flex");
          editingId = null;
        }, 200);
      }

      async function saveEdit() {
        if (!editingId) return;
        const n = notes.find((n) => n.id === editingId);
        if (n) {
          try {
            // Update local object
            if (els.editTitle) n.title = els.editTitle.value.trim();
            n.text = els.editText.value.trim();
            n.tag = els.editTag.value.trim();
            n.pinned = els.editPinned.checked;
            n.isDraft = false; // Mark as active when saved
            n.updatedAt = Date.now();

            // Save to Firestore
            await window.saveNoteToFirestore(n);

            saveNotes();
            closeEdit();
            showToast("Perubahan disimpan");

            // Switch from drafts to all if currently viewing drafts
            if (currentFilter === "drafts") {
              filterNotes("all");
            }
          } catch (error) {
            console.error("Error saving edit:", error);
            showToast("Gagal menyimpan");
          }
        }
      }

      // ============ Navigation & Filtering ============
      function updateTags() {
        // Exclude drafts
        const tags = new Set(
          notes.filter((n) => !n.isDraft && n.tag).map((n) => n.tag),
        );
        const html = Array.from(tags)
          .map(
            (tag) => `
        <button onclick="filterNotes('tag:${tag}')" 
          class="w-full flex items-center justify-between px-3 py-1.5 rounded-lg text-sm text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors ${currentFilter === "tag:" + tag ? "bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-200" : ""}">
          <span class="truncate"># ${escapeHtml(tag)}</span>
        </button>
      `,
          )
          .join("");
        els.tagsList.innerHTML = html;
      }

      function filterNotes(type) {
        currentFilter = type;

        // Mode Switching
        if (type === "tasks") {
          currentMode = "tasks";
          els.notesGrid.classList.add("hidden");
          els.tasksView.classList.remove("hidden");
        } else {
          currentMode = "notes";
          els.notesGrid.classList.remove("hidden");
          els.tasksView.classList.add("hidden");
        }

        render();

        const btnClass =
          "w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors";

        // Update Active State Sidebar
        els.navAll.className = `${btnClass} ${
          type === "all"
            ? "bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300"
            : "text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800"
        }`;

        els.navPinned.className = `${btnClass} ${
          type === "pinned"
            ? "bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300"
            : "text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800"
        }`;

        if (els.navDrafts) {
          els.navDrafts.className = `${btnClass} ${
            type === "drafts"
              ? "bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300"
              : "text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800"
          }`;
        }

        updateTags(); // Re-render tags to update active state
      }

      function getFiltered() {
        let filtered = [...notes];
        const q = els.searchInput.value.toLowerCase();

        // Search
        if (q) {
          filtered = filtered.filter(
            (n) =>
              n.text.toLowerCase().includes(q) ||
              (n.title || "").toLowerCase().includes(q) ||
              (n.tag || "").toLowerCase().includes(q),
          );
        }

        // Filter Type
        if (currentFilter === "pinned") {
          filtered = filtered.filter((n) => n.pinned && !n.isDraft);
        } else if (currentFilter === "drafts") {
          filtered = filtered.filter((n) => n.isDraft);
        } else if (currentFilter === "all") {
          filtered = filtered.filter((n) => !n.isDraft);
        } else if (currentFilter.startsWith("tag:")) {
          const tag = currentFilter.split(":")[1];
          filtered = filtered.filter((n) => n.tag === tag && !n.isDraft);
        }

        // Sort: Pinned first, then Newest
        return filtered.sort((a, b) => {
          if (a.pinned !== b.pinned) return b.pinned - a.pinned;
          return b.createdAt - a.createdAt;
        });
      }

      async function clearAll() {
        if (!notes.length) return;
        if (confirm("Hapus SEMUA catatan?")) {
          try {
            await window.clearAllNotesFromFirestore();
            notes = [];
            saveNotes();
            showToast("Semua dihapus");
          } catch (error) {

            showToast("Gagal menghapus");
          }

        const a = document.createElement("a");

      let currentTaskFilter = "all"; // all, today, upcoming, completed

      function setTaskFilter(filter) {
        currentTaskFilter = filter;

        // Update active tab styles
        const tabs = ["all", "today", "upcoming", "completed"];
        tabs.forEach((t) => {
          const el = $(`task-filter-${t}`);
          if (t === filter) {
            el.className =
              "px-4 py-2 text-sm font-medium border-b-2 transition-colors whitespace-nowrap border-blue-600 text-blue-600 dark:text-blue-400";
          } else {
            el.className =
              "px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-colors whitespace-nowrap";
          }
        });

        renderTasks();
      }

      function isToday(timestamp) {
        const today = new Date();
        const date = new Date(timestamp);
        return (
          date.getDate() === today.getDate() &&
          date.getMonth() === today.getMonth() &&
          date.getFullYear() === today.getFullYear()
        );
      }

      function isUpcoming(timestamp) {
        const today = new Date();
        today.setHours(23, 59, 59, 999);
        return timestamp > today.getTime();
      }

      function renderTasks() {
        // Calculate Progress
        const total = tasks.length;
        const completedCount = tasks.filter((t) => t.completed).length;
        const progressPercent =
          total === 0 ? 0 : Math.round((completedCount / total) * 100);

        els.taskProgressText.textContent = `${completedCount} / ${total} completed`;
        els.taskProgressBar.style.width = `${progressPercent}%`;

        // Filter Tasks
        let filteredTasks = tasks;
        if (currentTaskFilter === "today") {
          filteredTasks = tasks.filter(
            (t) => t.dueDate && isToday(t.dueDate) && !t.completed,
          );
        } else if (currentTaskFilter === "upcoming") {
          filteredTasks = tasks.filter(
            (t) => t.dueDate && isUpcoming(t.dueDate) && !t.completed,
          );
        } else if (currentTaskFilter === "completed") {
          filteredTasks = tasks.filter((t) => t.completed);
        }

        // Sort: Incomplete first, then by nearest dueDate
        filteredTasks.sort((a, b) => {
          if (a.completed !== b.completed) return a.completed ? 1 : -1;
          if (!a.dueDate && !b.dueDate) return b.createdAt - a.createdAt;
          if (!a.dueDate) return 1;
          if (!b.dueDate) return -1;
          return a.dueDate - b.dueDate;
        });

        // Render Empty State if no tasks
        if (filteredTasks.length === 0) {
          els.taskList.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12 text-slate-400 border border-dashed border-slate-200 dark:border-slate-800 rounded-xl">
                        <i data-lucide="check-circle" class="h-8 w-8 text-slate-300 dark:text-slate-600 mb-2"></i>
                        <p class="text-sm">Tidak ada tugas dalam kategori ini.</p>
                    </div>`;
          lucide.createIcons({
            nodes: els.taskList.querySelectorAll("[data-lucide]"),
          });
          return;
        }

        els.taskList.innerHTML = filteredTasks
          .map((t) => {
            const dateText = t.dueDate
              ? new Date(t.dueDate).toLocaleDateString("id-ID", {
                  day: "numeric",
                  month: "short",
                  hour: "2-digit",
                  minute: "2-digit",
                })
              : "No Date";
            const isOverdue =
              t.dueDate &&
              t.dueDate < Date.now() &&
              !t.completed &&
              !isToday(t.dueDate);

            const dateColor = t.completed
              ? "text-slate-400 dark:text-slate-500"
              : isOverdue
                ? "text-rose-500 dark:text-rose-400"
                : "text-slate-500 dark:text-slate-400";

            const textStyle = t.completed
              ? "line-through text-slate-400 dark:text-slate-500"
              : "text-slate-800 dark:text-slate-100 font-medium";
            const wrapperStyle = t.completed
              ? "opacity-60 bg-slate-50 dark:bg-slate-900"
              : "bg-white dark:bg-slate-900";

            return `
                    <div class="flex items-center gap-4 p-4 ${wrapperStyle} border border-slate-200 dark:border-slate-800 rounded-xl transition-all duration-200 hover:shadow-sm">
                        
                        <div class="flex items-center justify-center pt-0.5">
                            <label class="relative flex items-center p-1 rounded-full cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                                <input type="checkbox" ${t.completed ? "checked" : ""} onclick="event.stopPropagation(); toggleTask('${t.id}')"
                                    class="peer relative appearance-none w-5 h-5 border-2 border-slate-300 dark:border-slate-600 rounded cursor-pointer transition-all checked:border-blue-600 checked:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:ring-offset-1 focus:ring-offset-white dark:focus:ring-offset-slate-900">
                                <div class="pointer-events-none absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white opacity-0 transition-opacity peer-checked:opacity-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor" stroke="currentColor" stroke-width="1">
                                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                                    </svg>
                                </div>
                            </label>
                        </div>
                        
                        <div class="flex-1 min-w-0">
                            <p class="${textStyle} text-base break-words truncate">${escapeHtml(t.title)}</p>
                            <div class="flex items-center gap-3 mt-1 text-xs">
                                <div class="flex items-center gap-1 ${dateColor}">
                                    <i data-lucide="calendar" class="h-3.5 w-3.5"></i>
                                    <span>${dateText}</span>
                                </div>
                                ${
                                  t.reminder
                                    ? `
                                <div class="flex items-center gap-1 text-blue-500 dark:text-blue-400">
                                    <i data-lucide="bell" class="h-3.5 w-3.5 ${t.completed ? "opacity-50" : ""}"></i>
                                </div>`
                                    : ""
                                }
                            </div>
                        </div>

                        <button onclick="event.stopPropagation(); deleteTask('${t.id}')" class="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/20 rounded-lg transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100 sm:opacity-100">
                            <i data-lucide="trash-2" class="h-4 w-4"></i>
                        </button>
                    </div>
                `;
          })
          .join("");

        lucide.createIcons({
          nodes: els.taskList.querySelectorAll("[data-lucide]"),
        });
      }

      // ============ Search Dropdown ============
      function getSnippet(text, query, radius = 60) {
        const lower = text.toLowerCase();
        const idx = lower.indexOf(query.toLowerCase());
        if (idx === -1) return null;
        const start = Math.max(0, idx - radius);
        const end = Math.min(text.length, idx + query.length + radius);
        let snippet =
          (start > 0 ? "…" : "") +
          text.slice(start, end) +
          (end < text.length ? "…" : "");
        // Highlight the match
        const re = new RegExp(
          `(${query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`,
          "gi",
        );
        snippet = snippet.replace(
          re,
          '<mark class="bg-yellow-200 dark:bg-yellow-700/60 text-slate-900 dark:text-slate-100 rounded px-0.5">$1</mark>',
        );
        return snippet;
      }

      function renderSearchDropdown() {
        const q = els.searchInput.value.trim();
        if (!q || q.length < 1) {
          els.searchDropdown.classList.add("hidden");
          return;
        }

        const ql = q.toLowerCase();
        const results = [];

        for (const n of notes) {
          const matchTitle = (n.title || "").toLowerCase().includes(ql);
          const matchText = (n.text || "").toLowerCase().includes(ql);
          const matchTag = (n.tag || "").toLowerCase().includes(ql);

          if (!matchTitle && !matchText && !matchTag) continue;

          const matches = [];
          if (matchTitle)
            matches.push({
              where: "Judul",
              snippet: getSnippet(n.title || "", q),
              color: "blue",
            });
          if (matchTag)
            matches.push({
              where: "Tag",
              snippet: getSnippet(n.tag || "", q),
              color: "purple",
            });
          if (matchText)
            matches.push({
              where: "Isi",
              snippet: getSnippet(n.text || "", q),
              color: "green",
            });

          results.push({ note: n, matches });
        }

        if (results.length === 0) {
          els.searchDropdownList.innerHTML = `
                    <div class="px-4 py-6 text-center text-sm text-slate-400 dark:text-slate-500">
                        Tidak ada catatan yang cocok
                    </div>`;
          els.searchDropdown.classList.remove("hidden");
          return;
        }

        const colorMap = {
          blue: "bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300",
          purple:
            "bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-300",
          green:
            "bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300",
        };

        els.searchDropdownList.innerHTML = results
          .map(({ note: n, matches }) => {
            const title = escapeHtml(n.title || "Tanpa Judul");
            const matchesHtml = matches
              .map(
                (m) => `
                    <div class="mt-1.5">
                        <span class="inline-block text-[10px] font-semibold px-1.5 py-0.5 rounded ${colorMap[m.color]} mr-1.5 uppercase tracking-wide">${m.where}</span>
                        <span class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">${m.snippet}</span>
                    </div>`,
              )
              .join("");

            return `
                    <div onclick="closeSearchDropdown(); openView('${n.id}')"
                        class="px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-800/60 cursor-pointer transition-colors border-b border-slate-100 dark:border-slate-800 last:border-0">
                        <div class="font-semibold text-sm text-slate-800 dark:text-slate-100 truncate">${title}</div>
                        ${matchesHtml}
                    </div>`;
          })
          .join("");

        els.searchDropdown.classList.remove("hidden");
      }

      function closeSearchDropdown() {
        // Save query so openView can highlight it, then clear
        lastSearchQuery = els.searchInput.value.trim();
        els.searchDropdown.classList.add("hidden");
        els.searchInput.value = "";
        render();
      }

      // ============ Initialization ============
      // Debounce: avoids running expensive functions on every keystroke
      function debounce(fn, delay) {
        let timer;
        return (...args) => {
          clearTimeout(timer);
          timer = setTimeout(() => fn(...args), delay);
        };
      }

      function setupEvents() {
        els.btnAdd.addEventListener("click", addNote);
        els.themeToggle.addEventListener("click", toggleTheme);
        const onSearch = debounce(() => {
          render();
          renderSearchDropdown();
        }, 200);
        els.searchInput.addEventListener("input", onSearch);
        els.searchInput.addEventListener("focus", renderSearchDropdown);
        // Close dropdown when clicking outside
        document.addEventListener("click", (e) => {
          if (
            !els.searchInput.contains(e.target) &&
            !els.searchDropdown.contains(e.target)
          ) {
            els.searchDropdown.classList.add("hidden");
          }
        });
        els.btnExport.addEventListener("click", exportJSON);
        els.btnCloseModal.addEventListener("click", closeEdit);
        els.btnSaveEdit.addEventListener("click", saveEdit);

        // Add Modal Events
        els.btnOpenAdd.addEventListener("click", openAddModal);
        els.btnCloseAdd.addEventListener("click", closeAddModal);

        // Mobile Sidebar Events
        if (document.getElementById("btnMenu")) {
          document.getElementById("btnMenu").addEventListener("click", () => {
            const sidebar = document.getElementById("sidebar");
            sidebar.classList.remove("hidden");
            sidebar.classList.add("flex");
          });
        }
        if (document.getElementById("btnCloseSidebar")) {
          document
            .getElementById("btnCloseSidebar")
            .addEventListener("click", () => {
              const sidebar = document.getElementById("sidebar");
              sidebar.classList.add("hidden");
              sidebar.classList.remove("flex");
            });
        }

        // View Modal Events
        if (els.btnCloseView) {
          els.btnCloseView.addEventListener("click", closeView);
        }

        // Auth Modal Events
        // els.btnProfile.addEventListener("click", openAuthModal); // Handled in updateAuthUI now logic

        // Close dropdown when clicking outside
        document.addEventListener("click", (e) => {
          if (
            els.profileDropdown &&
            !els.profileDropdown.classList.contains("hidden")
          ) {
            if (
              !els.btnProfile.contains(e.target) &&
              !els.profileDropdown.contains(e.target)
            ) {
              els.profileDropdown.classList.add("hidden");
            }
          }
        });
        els.tabLogin.addEventListener("click", switchToLogin);
        els.tabRegister.addEventListener("click", switchToRegister);
        els.btnCancelAuth.addEventListener("click", closeAuthModal);
        els.btnCancelRegister.addEventListener("click", closeAuthModal);
        els.btnLoginSubmit.addEventListener("click", handleLogin);
        els.btnRegisterSubmit.addEventListener("click", handleRegister);

        // Logout Modal Events
        if (els.btnSidebarLogout)
          els.btnSidebarLogout.addEventListener("click", handleLogout);
        if (els.btnHeaderLogout)
          els.btnHeaderLogout.addEventListener("click", handleLogout);

        els.btnCancelLogout.addEventListener("click", closeLogoutModal);
        els.btnConfirmLogout.addEventListener("click", confirmLogout);
        els.logoutModal.addEventListener("click", (e) => {
          if (
            e.target === els.logoutModal ||
            e.target.id === "logoutModalBackdrop"
          ) {
            closeLogoutModal();
          }
        });

        document.addEventListener("keydown", (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
            addNote();
            // Blur input to hide mobile keyboard
            els.noteText.blur();
            if (els.noteTitle) els.noteTitle.blur();
          }
          if (e.key === "Escape") {
            closeEdit();
            closeAddModal();
            if (closeView) closeView();
          }
        });

        // Auto resize textarea
        els.noteText.addEventListener("input", function () {
          this.style.height = "auto";
          this.style.height = this.scrollHeight + "px";
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        try {
          initTheme();
          loadNotes();
          setupEvents();
          render();
        } catch (e) {
          alert("Error: " + e.message);
          console.error(e);
        }
      });
    </script>

    <!-- Firebase Configuration -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics.js";
      import {
        getFirestore,
        collection,
        addDoc,
        getDocs,
        updateDoc,
        deleteDoc,
        doc,
        query,
        where,
        writeBatch,
      } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
      import {
        getAuth,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        signOut,
        onAuthStateChanged,
        updateProfile,
      } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAYIxoBvCXgWOxO8GZXbjkCpg0-RzUkD84",
        authDomain: "nonoted-80e19.firebaseapp.com",
        projectId: "nonoted-80e19",
        storageBucket: "nonoted-80e19.firebasestorage.app",
        messagingSenderId: "415606234780",
        appId: "1:415606234780:web:b22fe405eeccf7cd979759",
        measurementId: "G-R21QL2PFQV",
      };

      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      const db = getFirestore(app);
      const auth = getAuth(app);

      // Current user ID (updated by auth state listener)
      let currentUserId = "default_user";

      // ========== Firestore CRUD Functions ==========

      // Load all notes for current user
      window.loadNotesFromFirestore = async function () {
        try {
          const q = query(
            collection(db, "notes"),
            where("userId", "==", currentUserId),
          );
          const snapshot = await getDocs(q);
          return snapshot.docs.map((doc) => ({
            id: doc.id,
            ...doc.data(),
          }));
        } catch (error) {
          console.error("Error loading notes:", error);
          return [];
        }
      };

      // Save note to Firestore (create or update)
      window.saveNoteToFirestore = async function (note) {
        try {
          const noteData = {
            userId: currentUserId,
            title: note.title || "",
            text: note.text || "",
            tag: note.tag || "",
            pinned: note.pinned || false,
            isDraft: note.isDraft || false,
            createdAt: note.createdAt || Date.now(),
            updatedAt: Date.now(),
          };

          if (note.id) {
            // Update existing
            await updateDoc(doc(db, "notes", note.id), noteData);
            return note.id;
          } else {
            // Create new
            const docRef = await addDoc(collection(db, "notes"), noteData);
            return docRef.id;
          }
        } catch (error) {
          console.error("Error saving note:", error);
          throw error;
        }
      };

      // Delete note from Firestore
      window.deleteNoteFromFirestore = async function (noteId) {
        try {
          await deleteDoc(doc(db, "notes", noteId));
        } catch (error) {
          console.error("Error deleting note:", error);
          throw error;
        }
      };

      // ============ Firebase Tasks Functions ============
      window.loadTasksFromFirestore = async function () {
        try {
          const q = query(
            collection(db, "tasks"),
            where("userId", "==", currentUserId),
            orderBy("createdAt", "desc"),
          );

          const snapshot = await getDocs(q);
          return snapshot.docs.map((doc) => ({
            id: doc.id,
            ...doc.data(),
          }));
        } catch (error) {
          console.error("Error loading tasks:", error);
          // Return empty array if index needs to be built or other error
          return [];
        }
      };

      window.saveTaskToFirestore = async function (task) {
        try {
          // If the id is a generated local id, we should let Firestore generate it or use it as doc ID
          const isLocalId = !task.id.includes("-"); // Rough check, adjust if needed

          const taskData = {
            userId: currentUserId,
            title: task.title,
            completed: task.completed || false,
            dueDate: task.dueDate || null,
            reminder: task.reminder || null,
            createdAt: task.createdAt || Date.now(),
          };

          // Use the id we set, but handle new documents
          const docRef = doc(db, "tasks", task.id);
          // setDoc with merge: true creates or updates
          await setDoc(docRef, taskData, { merge: true });
          return task.id;
        } catch (error) {
          console.error("Error saving task:", error);
          throw error;
        }
      };

      window.deleteTaskFromFirestore = async function (taskId) {
        try {
          await deleteDoc(doc(db, "tasks", taskId));
        } catch (error) {
          console.error("Error deleting task:", error);
          throw error;
        }
      };

      // Delete all notes for current user
      window.clearAllNotesFromFirestore = async function () {
        try {
          const q = query(
            collection(db, "notes"),
            where("userId", "==", currentUserId),
          );
          const snapshot = await getDocs(q);

          const batch = writeBatch(db);
          snapshot.docs.forEach((doc) => {
            batch.delete(doc.ref);
          });

          await batch.commit();

          // Clear Tasks as well
          const qTasks = query(
            collection(db, "tasks"),
            where("userId", "==", currentUserId),
          );
          const snapTasks = await getDocs(qTasks);
          const batchTasks = writeBatch(db);
          snapTasks.docs.forEach((doc) => {
            batchTasks.delete(doc.ref);
          });
          await batchTasks.commit();
        } catch (error) {
          console.error("Error clearing all notes:", error);
          throw error;
        }
      };

      // One-time migration from localStorage to Firestore
      window.migrateLocalToFirebase = async function () {
        try {
          const STORAGE_KEY = "modern_notes_v2";
          const raw = localStorage.getItem(STORAGE_KEY);

          if (!raw) {
            console.log("No localStorage data to migrate");
            return 0;
          }

          const oldNotes = JSON.parse(raw);
          let count = 0;

          for (const note of oldNotes) {
            const noteData = {
              userId: currentUserId,
              title: note.title || "",
              text: note.text || "",
              tag: note.tag || "",
              pinned: note.pinned || false,
              isDraft: note.isDraft || false,
              createdAt: note.createdAt || Date.now(),
              updatedAt: note.updatedAt || Date.now(),
            };

            await addDoc(collection(db, "notes"), noteData);
            count++;
          }

          // Clear localStorage after successful migration
          localStorage.removeItem(STORAGE_KEY);
          console.log(
            `Migration complete: ${count} notes migrated to Firestore`,
          );
          return count;
        } catch (error) {
          console.error("Error during migration:", error);
          throw error;
        }
      };

      // Migrate guest Firestore notes to logged-in user account
      window.migrateGuestNotesToAccount = async function () {
        if (!currentUserId || currentUserId === "default_user") return 0;
        try {
          const guestQ = query(
            collection(db, "notes"),
            where("userId", "==", "default_user"),
          );
          const guestSnap = await getDocs(guestQ);
          if (guestSnap.empty) return 0;

          let count = 0;
          for (const guestDoc of guestSnap.docs) {
            await updateDoc(doc(db, "notes", guestDoc.id), {
              userId: currentUserId,
            });
            count++;
          }
          console.log(`Migrated ${count} guest notes to account`);
          if (count > 0)
            showToast(`${count} catatan guest berhasil disimpan ke akun`);
          return count;
        } catch (error) {
          console.error("Guest migration error:", error);
          return 0;
        }
      };

      // ========== Firebase Auth Functions ==========

      // Register new user
      window.registerUser = async function (name, email, password) {
        try {
          const userCredential = await createUserWithEmailAndPassword(
            auth,
            email,
            password,
          );
          // Update profile with display name
          await updateProfile(userCredential.user, {
            displayName: name,
          });
          return { success: true, user: userCredential.user };
        } catch (error) {
          console.error("Registration error:", error);
          return { success: false, error: error.message };
        }
      };

      // Login existing user
      window.loginUser = async function (email, password) {
        try {
          const userCredential = await signInWithEmailAndPassword(
            auth,
            email,
            password,
          );
          return { success: true, user: userCredential.user };
        } catch (error) {
          console.error("Login error:", error);
          return { success: false, error: error.message };
        }
      };

      // Logout current user
      window.logoutUser = async function () {
        try {
          await signOut(auth);
          return { success: true };
        } catch (error) {
          console.error("Logout error:", error);
          return { success: false, error: error.message };
        }
      };

      // Auth state listener
      onAuthStateChanged(auth, async (user) => {
        if (user) {
          // User is signed in
          currentUserId = user.uid;
          console.log("User authenticated:", user.email);

          // Update UI
          if (window.updateAuthUI) {
            window.updateAuthUI(user);
          }

          // Load user's notes and tasks
          await loadNotes();
          tasks = await window.loadTasksFromFirestore();
          saveTasks(); // updates local state and re-renders
        } else {
          // User is signed out
          currentUserId = "default_user";
          console.log("User not authenticated, using guest mode");

          // Clear notes AND tags so account data doesn't show after logout
          notes = [];
          tasks = [];
          currentFilter = "all";
          updateTags();
          render();

          // Update UI
          if (window.updateAuthUI) {
            window.updateAuthUI(null);
          }
        }
      });

      // Expose currentUserId getter
      window.getCurrentUserId = () => currentUserId;

      console.log("Firebase initialized successfully");

      // ============ Background Reminder Check ============
      setInterval(() => {
        if (!tasks || tasks.length === 0) return;
        const now = Date.now();

        tasks.forEach((t) => {
          if (
            !t.completed &&
            t.reminder &&
            t.reminder <= now &&
            !t.reminderShown
          ) {
            showToast(`REMINDER: ${t.title}`);
            t.reminderShown = true;
            // Auto-hide reminder logic (local only to not spam DB ideally, but optional)
            // If we synced it, we would update Firestore here:
            if (window.saveTaskToFirestore) {
              window.saveTaskToFirestore(t);
            }
          }
        });
      }, 10000); // Check every 10 seconds
    </script>
